<!DOCTYPE html>
<html lang="en">

<head>
      <link rel="icon" type="image/png" href="/public/circlelogo.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
    <script src="https://unpkg.com/lucide@latest"></script>

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap"
    rel="stylesheet">
  <style>
    * {
      box-sizing: border-box
    }

    body {
      font-family: "DM Sans", sans-serif;
      background: #f0f2f8;
      color: #1e293b
    }

    h1,
    h2,
    h3,
    h4,
    .font-outfit {
      font-family: "Outfit", sans-serif
    }

    .finput {
      width: 100%;
      padding: .625rem .875rem;
      border-radius: .75rem;
      border: 1.5px solid #e2e8f0;
      background: #f0f2f8;
      font-size: .875rem;
      outline: none;
      transition: all .15s;
      color: #1e293b
    }

    .finput:focus {
      background: #fff;
      border-color: #6366f1;
      box-shadow: 0 0 0 3px rgba(99, 102, 241, .12)
    }

    .lbl {
      display: block;
      font-size: .8125rem;
      font-weight: 600;
      color: #475569;
      margin-bottom: .375rem
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      background: rgba(15, 23, 42, .55);
      backdrop-filter: blur(4px)
    }

    .modal-box {
      background: #fff;
      border-radius: 1.5rem;
      box-shadow: 0 25px 50px rgba(0, 0, 0, .22);
      width: 100%;
      overflow: hidden;
      animation: modalIn .2s ease
    }

    @keyframes modalIn {
      from {
        opacity: 0;
        transform: scale(.96) translateY(6px)
      }

      to {
        opacity: 1;
        transform: scale(1) translateY(0)
      }
    }

    .tab-bar {
      display: flex;
      border-bottom: 2px solid #f1f5f9;
      overflow-x: auto;
      gap: .25rem;
      padding: 0 1rem
    }

    .tab-bar::-webkit-scrollbar {
      display: none
    }

    .tab-btn {
      padding: .875rem 1.125rem;
      font-size: .8125rem;
      font-weight: 600;
      background: none;
      border: none;
      cursor: pointer;
      white-space: nowrap;
      color: #94a3b8;
      border-bottom: 2.5px solid transparent;
      margin-bottom: -2px;
      transition: all .15s;
      font-family: "DM Sans", sans-serif
    }

    .tab-btn.active {
      color: #6366f1;
      border-bottom-color: #6366f1
    }

    .tab-btn:not(.active):hover {
      color: #475569
    }

    ::-webkit-scrollbar {
      width: 5px;
      height: 5px
    }

    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 999px
    }
  </style>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Library - EduManage Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .finput {
      width: 100%;
      padding: .625rem .75rem;
      border-radius: .75rem;
      border: 1px solid #e5e7eb;
      background: #f9fafb;
      font-size: .875rem;
      outline: none
    }

    .finput:focus {
      background: #fff;
      border-color: #3b82f6
    }

    .lbl {
      display: block;
      font-size: .875rem;
      font-weight: 500;
      color: #374151;
      margin-bottom: .375rem
    }
  </style>
</head>

<body>
   <div class="min-h-screen">
    <div id="sidebarContainer"></div>
    <main class="min-h-screen lg:ml-[260px]">
      <div id="topbarContainer"></div>
      <div class="p-6 space-y-6">
        <div id="libStats" class="grid grid-cols-2 sm:grid-cols-4 gap-4"></div>
        <div
          style="background:#fff;border-radius:1.25rem;border:1.5px solid #f1f5f9;box-shadow:0 1px 3px rgba(0,0,0,.04)">
          <div class="tab-bar">
            <button onclick="switchTab(0)"
              class="ltab px-5 py-4 text-sm font-semibold border-b-2 border-blue-600 text-blue-600 whitespace-nowrap">Books
              Catalog</button>
            <button onclick="switchTab(1)"
              class="ltab px-5 py-4 text-sm font-semibold border-b-2 border-transparent text-gray-500 hover:text-gray-700 whitespace-nowrap">Issue
              Book</button>
            <button onclick="switchTab(2)"
              class="ltab px-5 py-4 text-sm font-semibold border-b-2 border-transparent text-gray-500 hover:text-gray-700 whitespace-nowrap">Issued
              Books</button>
            <button onclick="switchTab(3)"
              class="ltab px-5 py-4 text-sm font-semibold border-b-2 border-transparent text-gray-500 hover:text-gray-700 whitespace-nowrap">Members</button>
            <button onclick="switchTab(4)"
              class="ltab px-5 py-4 text-sm font-semibold border-b-2 border-transparent text-gray-500 hover:text-gray-700 whitespace-nowrap">Overdue</button>
          </div>
          <!-- Books -->
          <div id="ltab0" class="p-5">
            <div class="flex flex-col sm:flex-row gap-3 justify-between mb-4">
              <div class="flex gap-2 flex-wrap">
                <input id="bookSearch" type="text" placeholder="Search title, author, ISBN..."
                  class="px-4 py-2.5 rounded-xl border border-gray-200 bg-gray-50 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm w-64" />
                <label
                  class="flex items-center gap-1 px-3 py-2.5 rounded-xl border border-gray-200 bg-gray-50 text-sm cursor-pointer">
                  <input type="checkbox" id="availableOnly" class="accent-blue-600" /><span>Available only</span>
                </label>
              </div>
              <button onclick="document.getElementById('bookModal').style.display='flex';loadBookCats()"
                class="px-5 py-2.5 bg-blue-600 text-white rounded-xl font-semibold text-sm hover:bg-blue-700 shadow-lg whitespace-nowrap">+
                Add Book</button>
            </div>
            <div id="bookTable"></div>
            <div id="bookPgn" class="flex justify-between items-center mt-4 text-sm text-gray-500"></div>
          </div>
          <!-- Issue -->
          <div id="ltab1" class="p-5 hidden">
            <h4 class="font-bold text-gray-900 mb-5">Issue a Book</h4>
            <div class="max-w-lg space-y-4">
              <div><label class="lbl">Member *</label><select id="issue_member" class="finput">
                  <option value="">Select member</option>
                </select></div>
              <div><label class="lbl">Book *</label><select id="issue_book" class="finput">
                  <option value="">Select book</option>
                </select></div>
              <div id="bookInfo" class="hidden bg-blue-50 rounded-xl p-4 text-sm space-y-1">
                <div class="flex justify-between"><span class="text-blue-700">Available Copies:</span><span
                    id="bookAvail" class="font-bold text-blue-900"></span></div>
              </div>
              <button onclick="issueBook()"
                class="w-full px-6 py-3 bg-blue-600 text-white rounded-xl font-semibold text-sm hover:bg-blue-700 shadow-lg">Issue
                Book</button>
            </div>
          </div>
          <!-- Issued Books -->
          <div id="ltab2" class="p-5 hidden">
            <div class="flex justify-between mb-4">
              <select id="issueFilter" class="px-3 py-2.5 rounded-xl border border-gray-200 bg-gray-50 text-sm"
                onchange="loadIssued()">
                <option value="Issued">Currently Issued</option>
                <option value="Returned">Returned</option>
                <option value="">All</option>
              </select>
            </div>
            <div id="issuedTable"></div>
          </div>
          <!-- Members -->
          <div id="ltab3" class="p-5 hidden">
            <div class="flex justify-between mb-4">
              <h4 class="font-bold text-gray-900">Library Members</h4>
              <button onclick="document.getElementById('memberModal').style.display='flex';loadMemberStudents()"
                class="px-4 py-2 bg-blue-600 text-white rounded-xl text-sm font-medium hover:bg-blue-700">+ Register
                Member</button>
            </div>
            <div id="memberTable"></div>
          </div>
          <!-- Overdue -->
          <div id="ltab4" class="p-5 hidden">
            <div class="flex justify-between mb-4">
              <h4 class="font-bold text-gray-900">Overdue Books</h4>
              <button onclick="loadOverdue()"
                class="px-4 py-2 bg-orange-600 text-white rounded-xl text-sm font-medium hover:bg-orange-700">Refresh</button>
            </div>
            <div id="overdueTable"></div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Book Modal -->
  <div id="bookModal" class="modal-overlay" style="display:none">
    <div class="modal-box w-full max-w-lg max-h-[90vh] overflow-y-auto">
      <div class="flex justify-between items-center px-6 py-4 border-b">
        <h3 class="font-bold text-gray-900">Add Book</h3><button
          onclick="document.getElementById('bookModal').style.display='none'"
          class="text-gray-400 hover:text-gray-600 text-xl px-2">×</button>
      </div>
      <div class="px-6 py-5 space-y-4">
        <div><label class="lbl">Title *</label><input id="bk_title" class="finput" placeholder="Book title" /></div>
        <div><label class="lbl">Author *</label><input id="bk_author" class="finput" placeholder="Author name" /></div>
        <div class="grid grid-cols-2 gap-4">
          <div><label class="lbl">ISBN</label><input id="bk_isbn" class="finput" placeholder="ISBN" /></div>
          <div><label class="lbl">Publisher</label><input id="bk_pub" class="finput" placeholder="Publisher" /></div>
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div><label class="lbl">Year</label><input id="bk_yr" type="number" class="finput" placeholder="2024" /></div>
          <div><label class="lbl">Language</label><select id="bk_lang" class="finput">
              <option value="English">English</option>
              <option value="Hindi">Hindi</option>
              <option value="Other">Other</option>
            </select></div>
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div><label class="lbl">Copies</label><input id="bk_copies" type="number" class="finput" value="1" /></div>
          <div><label class="lbl">Price (₹)</label><input id="bk_price" type="number" class="finput" placeholder="0" />
          </div>
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div><label class="lbl">Category</label><select id="bk_cat" class="finput">
              <option value="">Select category</option>
            </select></div>
          <div><label class="lbl">Rack Number</label><input id="bk_rack" class="finput" placeholder="e.g. A-12" /></div>
        </div>
        <label class="flex items-center gap-2"><input type="checkbox" id="bk_digital"
            class="w-4 h-4 accent-blue-600" /><span class="text-sm text-gray-700">Digital Book</span></label>
        <div id="bk_linkRow" class="hidden"><label class="lbl">Digital Link</label><input id="bk_link" class="finput"
            placeholder="https://..." /></div>
      </div>
      <div class="flex gap-3 px-6 py-4 border-t justify-end">
        <button onclick="document.getElementById('bookModal').style.display='none'"
          class="px-5 py-2.5 bg-gray-100 text-gray-700 rounded-xl text-sm">Cancel</button>
        <button onclick="saveBook()" class="px-5 py-2.5 bg-blue-600 text-white rounded-xl text-sm font-medium">Add
          Book</button>
      </div>
    </div>
  </div>

  <!-- Member Modal -->
  <div id="memberModal" class="modal-overlay" style="display:none">
    <div class="modal-box w-full max-w-md">
      <div class="flex justify-between items-center px-6 py-4 border-b">
        <h3 class="font-bold text-gray-900">Register Library Member</h3><button
          onclick="document.getElementById('memberModal').style.display='none'"
          class="text-gray-400 hover:text-gray-600 text-xl px-2">×</button>
      </div>
      <div class="px-6 py-5 space-y-4">
        <div><label class="lbl">Member Type *</label><select id="mb_type" class="finput" onchange="toggleMemberType()">
            <option value="Student">Student</option>
            <option value="Staff">Staff</option>
          </select></div>
        <div id="mb_student_row"><label class="lbl">Student *</label><select id="mb_student" class="finput">
            <option value="">Select student</option>
          </select></div>
        <div id="mb_staff_row" class="hidden"><label class="lbl">Staff *</label><select id="mb_staff" class="finput">
            <option value="">Select staff</option>
          </select></div>
        <div class="grid grid-cols-2 gap-4">
          <div><label class="lbl">Max Books</label><input id="mb_max" type="number" class="finput" value="3" /></div>
          <div><label class="lbl">Loan Days</label><input id="mb_days" type="number" class="finput" value="14" /></div>
        </div>
      </div>
      <div class="flex gap-3 px-6 py-4 border-t justify-end">
        <button onclick="document.getElementById('memberModal').style.display='none'"
          class="px-5 py-2.5 bg-gray-100 text-gray-700 rounded-xl text-sm">Cancel</button>
        <button onclick="saveMember()"
          class="px-5 py-2.5 bg-blue-600 text-white rounded-xl text-sm font-medium">Register</button>
      </div>
    </div>
  </div>

  <div id="toast" class="hidden fixed bottom-6 right-6 z-50 px-6 py-3 rounded-xl text-white font-medium shadow-2xl">
  </div>
  <script src="js/api.js"></script>
  <script src="js/layout.js"></script>
  <script>
    requireAuth();
    document.getElementById('sidebarContainer').innerHTML = renderSidebar('library');
    document.getElementById('topbarContainer').innerHTML = renderTopbar('Library Management', 'Manage books, issues and members');
    const schoolId = localStorage.getItem('school_id');
    let bookPage = 1;

    function switchTab(idx) {
      document.querySelectorAll('.ltab').forEach((b, i) => { b.classList.toggle('border-blue-600', i === idx); b.classList.toggle('text-blue-600', i === idx); b.classList.toggle('border-transparent', i !== idx); b.classList.toggle('text-gray-500', i !== idx); });
      document.querySelectorAll('[id^="ltab"]').forEach(t => { t.classList.toggle('hidden', parseInt(t.id.replace('ltab', '')) !== idx); });
      if (idx === 0) loadBooks(); if (idx === 1) loadIssueForm(); if (idx === 2) loadIssued(); if (idx === 3) loadMembers(); if (idx === 4) loadOverdue();
    }

    async function loadStats() {
      if (!schoolId) return;
      try {
        const r = await LibraryAPI.getStats(schoolId); const d = r?.data || {};
       document.getElementById('libStats').innerHTML =
  statCard('Total Titles', d.total_titles || 0, 'book-open', 'blue') +
  statCard('Available', d.available_copies || 0, 'check-circle', 'green') +
  statCard('Issued', d.issued_copies || 0, 'book', 'orange') +
  statCard('Overdue', d.overdue_books || 0, 'alert-triangle', 'red');

// 🔥 IMPORTANT
lucide.createIcons();
      } catch (e) { }
    }
    function statCard(title, value, icon, color) {
  return `
    <div class="bg-white p-4 rounded-2xl border border-gray-100 flex items-center justify-between">
      <div>
        <p class="text-sm text-gray-400">${title}</p>
        <h3 class="text-xl font-bold text-gray-900">${value}</h3>
      </div>
      <div class="p-3 rounded-xl bg-${color}-100 text-${color}-600">
        <i data-lucide="${icon}" class="w-5 h-5"></i>
      </div>
    </div>
  `;
}
    async function loadBookCats() {
      if (!schoolId) return;
      try { const r = await LibraryAPI.getCategories(schoolId); document.getElementById('bk_cat').innerHTML = '<option value="">Select category</option>' + (r?.data || []).map(c => `<option value="${c.id}">${c.name}</option>`).join(''); } catch (e) { }
    }

    document.getElementById('bk_digital').addEventListener('change', function () { document.getElementById('bk_linkRow').classList.toggle('hidden', !this.checked); });

    async function loadBooks(page = 1) {
      if (!schoolId) { document.getElementById('bookTable').innerHTML = '<div class="text-center py-8 text-gray-400">Configure school first</div>'; return; }
      const params = { school_id: schoolId, page, per_page: 15 };
      const srch = document.getElementById('bookSearch').value.trim();
      const avail = document.getElementById('availableOnly').checked;
      if (srch) params.search = srch; if (avail) params.available_only = 'true';
      try {
        const r = await LibraryAPI.getBooks(params); const books = r?.data || []; const meta = r?.meta || {};
        const hdrs = ['Title', 'Author', 'ISBN', 'Category', 'Copies', 'Available', 'Rack', 'Actions'];
        const rows = books.map(b => `
      <td class="px-4 py-3"><div class="font-medium text-gray-900 text-sm">${b.title}</div>${b.is_digital ? '<span class="text-xs text-blue-600">Digital</span>' : ''}</td>
      <td class="px-4 py-3 text-sm text-gray-600">${b.author}</td>
      <td class="px-4 py-3 font-mono text-xs text-gray-500">${b.isbn || '-'}</td>
      <td class="px-4 py-3 text-sm text-gray-600">${b.category || '-'}</td>
      <td class="px-4 py-3 text-center text-sm">${b.total_copies}</td>
      <td class="px-4 py-3 text-center"><span class="px-2 py-0.5 rounded-lg text-xs font-semibold ${b.available_copies > 0 ? 'bg-emerald-100 text-emerald-700' : 'bg-red-100 text-red-700'}">${b.available_copies}</span></td>
      <td class="px-4 py-3 text-sm text-gray-500">${b.rack_number || '-'}</td>
      <td class="px-4 py-3"><button onclick="deleteBook('${b.id}')" class="text-xs text-red-500 hover:underline">Delete</button></td>
    `);
        document.getElementById('bookTable').innerHTML = buildTable(hdrs, rows, 'No books in catalog');
        document.getElementById('bookPgn').innerHTML = meta.total ? `<span>Showing ${(page - 1) * 15 + 1}–${Math.min(page * 15, meta.total)} of ${meta.total}</span><div class="flex gap-2"><button onclick="loadBooks(${page - 1})" ${page <= 1 ? 'disabled' : ''} class="px-3 py-1.5 rounded-lg border disabled:opacity-40 text-sm">&#8592;</button><span class="px-3 py-1.5 text-sm">${page}</span><button onclick="loadBooks(${page + 1})" ${page >= (meta.total_pages || 1) ? 'disabled' : ''} class="px-3 py-1.5 rounded-lg border disabled:opacity-40 text-sm">&#8594;</button></div>` : '';
      } catch (e) { document.getElementById('bookTable').innerHTML = `<p class="text-red-400 text-sm p-4">Error: ${e.message}</p>`; }
    }

    async function saveBook() {
      if (!schoolId) { showToast('Configure school first', 'error'); return; }
      const title = document.getElementById('bk_title').value.trim(), author = document.getElementById('bk_author').value.trim();
      if (!title || !author) { showToast('Title and author required', 'error'); return; }
      try {
        await LibraryAPI.addBook({ school_id: schoolId, title, author, isbn: document.getElementById('bk_isbn').value || null, publisher: document.getElementById('bk_pub').value || null, year: parseInt(document.getElementById('bk_yr').value) || null, language: document.getElementById('bk_lang').value, total_copies: parseInt(document.getElementById('bk_copies').value) || 1, price: parseFloat(document.getElementById('bk_price').value) || 0, category_id: document.getElementById('bk_cat').value || null, rack_number: document.getElementById('bk_rack').value || null, is_digital: document.getElementById('bk_digital').checked, digital_link: document.getElementById('bk_link').value || null });
        showToast('Book added!'); document.getElementById('bookModal').style.display = 'none'; loadBooks(); loadStats();
      } catch (e) { showToast('Error: ' + e.message, 'error'); }
    }

    async function deleteBook(id) {
      if (!confirm('Remove this book?')) return;
      try { await LibraryAPI.deleteBook(id); showToast('Book removed'); loadBooks(); loadStats(); } catch (e) { showToast('Error: ' + e.message, 'error'); }
    }

    async function loadIssueForm() {
      if (!schoolId) return;
      try {
        const [mr, br] = await Promise.allSettled([LibraryAPI.getMembers(schoolId), LibraryAPI.getBooks({ school_id: schoolId, available_only: 'true', per_page: 100 })]);
        if (mr.status === 'fulfilled') document.getElementById('issue_member').innerHTML = '<option value="">Select member</option>' + (mr.value?.data || []).map(m => `<option value="${m.id}">${m.name} (${m.member_id}) - ${m.member_type}</option>`).join('');
        if (br.status === 'fulfilled') {
          const opts = '<option value="">Select book</option>' + (br.value?.data || []).map(b => `<option value="${b.id}" data-avail="${b.available_copies}">${b.title} by ${b.author} (${b.available_copies} avail)</option>`).join('');
          document.getElementById('issue_book').innerHTML = opts;
          document.getElementById('issue_book').addEventListener('change', function () {
            const opt = this.options[this.selectedIndex];
            if (opt.value) { document.getElementById('bookAvail').textContent = opt.dataset.avail; document.getElementById('bookInfo').style.display = 'flex'; }
            else document.getElementById('bookInfo').style.display = 'none';
          });
        }
      } catch (e) { }
    }

    async function issueBook() {
      if (!schoolId) { showToast('Configure school first', 'error'); return; }
      const memberId = document.getElementById('issue_member').value, bookId = document.getElementById('issue_book').value;
      if (!memberId || !bookId) { showToast('Select member and book', 'error'); return; }
      try {
        const r = await LibraryAPI.issueBook({ school_id: schoolId, book_id: bookId, member_id: memberId });
        showToast('Book issued! Due: ' + formatDate(r.data.due_date)); loadStats(); loadIssued();
      } catch (e) { showToast('Error: ' + e.message, 'error'); }
    }

    async function loadIssued() {
      if (!schoolId) return;
      const status = document.getElementById('issueFilter').value;
      try {
        const params = { school_id: schoolId }; if (status) params.status = status;
        const r = await LibraryAPI.getIssued(params); const data = r?.data || [];
        const hdrs = ['Book Title', 'Member', 'Member ID', 'Issue Date', 'Due Date', 'Return Date', 'Status', 'Fine', ''];
        const rows = data.map(i => `
      <td class="px-4 py-3 font-medium text-gray-900 text-sm">${i.book_title || '-'}</td>
      <td class="px-4 py-3 text-sm text-gray-700">${i.member_name || '-'}</td>
      <td class="px-4 py-3 font-mono text-xs text-gray-500">${i.member_id || '-'}</td>
      <td class="px-4 py-3 text-sm text-gray-600">${formatDate(i.issue_date)}</td>
      <td class="px-4 py-3 text-sm font-medium ${i.days_overdue > 0 ? 'text-red-600' : 'text-gray-600'}">${formatDate(i.due_date)}</td>
      <td class="px-4 py-3 text-sm text-gray-500">${i.return_date ? formatDate(i.return_date) : '-'}</td>
      <td class="px-4 py-3">${tdBadge(i.status, i.status === 'Returned' ? 'green' : i.status === 'Overdue' ? 'red' : 'blue')}</td>
      <td class="px-4 py-3 text-sm ${i.fine_amount > 0 ? 'font-bold text-red-500' : 'text-gray-500'}">${i.fine_amount > 0 ? formatCurrency(i.fine_amount) : '-'}</td>
      <td class="px-4 py-3">${i.status !== 'Returned' ? `<button onclick="returnBook('${i.id}')" class="px-2 py-1 bg-emerald-100 text-emerald-700 rounded-lg text-xs font-medium hover:bg-emerald-200">Return</button>` : ''}
      </td>
    `);
        document.getElementById('issuedTable').innerHTML = buildTable(hdrs, rows, 'No issued books');
      } catch (e) { }
    }

    async function returnBook(id) {
      try { const r = await LibraryAPI.returnBook(id); showToast('Book returned!' + (r.data.fine_amount > 0 ? ' Fine: ' + formatCurrency(r.data.fine_amount) : '')); loadIssued(); loadStats(); }
      catch (e) { showToast('Error: ' + e.message, 'error'); }
    }

    async function loadOverdue() {
      if (!schoolId) return;
      try {
        const r = await LibraryAPI.getIssued({ school_id: schoolId, overdue_only: true }); const data = r?.data || [];
        const hdrs = ['Book', 'Member', 'Due Date', 'Days Overdue', 'Fine'];
        const rows = data.map(i => `
      <td class="px-4 py-3 font-medium text-gray-900 text-sm">${i.book_title}</td>
      <td class="px-4 py-3 text-sm text-gray-700">${i.member_name} (${i.member_id})</td>
      <td class="px-4 py-3 text-sm text-red-600 font-medium">${formatDate(i.due_date)}</td>
      <td class="px-4 py-3 text-center"><span class="px-2 py-1 bg-red-100 text-red-700 rounded-lg text-xs font-bold">${i.days_overdue} days</span></td>
      <td class="px-4 py-3 font-bold text-red-500">${formatCurrency(i.days_overdue * 1)}</td>
    `);
        document.getElementById('overdueTable').innerHTML = buildTable(hdrs, rows, 'No overdue books!');
      } catch (e) { }
    }

    async function loadMemberStudents() {
      if (!schoolId) return;
      try {
        const [sr, sfr] = await Promise.allSettled([StudentAPI.list({ school_id: schoolId, per_page: 200 }), StaffAPI.list({ school_id: schoolId, per_page: 100 })]);
        if (sr.status === 'fulfilled') document.getElementById('mb_student').innerHTML = '<option value="">Select student</option>' + (sr.value?.data || []).map(s => `<option value="${s.id}">${s.full_name} (${s.admission_no})</option>`).join('');
        if (sfr.status === 'fulfilled') document.getElementById('mb_staff').innerHTML = '<option value="">Select staff</option>' + (sfr.value?.data || []).map(s => `<option value="${s.id}">${s.full_name} (${s.employee_id})</option>`).join('');
      } catch (e) { }
    }

    function toggleMemberType() {
      const t = document.getElementById('mb_type').value;
      document.getElementById('mb_student_row').classList.toggle('hidden', t !== 'Student');
      document.getElementById('mb_staff_row').classList.toggle('hidden', t !== 'Staff');
    }

    async function saveMember() {
      if (!schoolId) { showToast('Configure school first', 'error'); return; }
      const type = document.getElementById('mb_type').value;
      const stId = type === 'Student' ? document.getElementById('mb_student').value : null;
      const sfId = type === 'Staff' ? document.getElementById('mb_staff').value : null;
      if (!stId && !sfId) { showToast('Select student or staff', 'error'); return; }
      try {
        await LibraryAPI.addMember({ school_id: schoolId, member_type: type, student_id: stId, staff_id: sfId, max_books_allowed: parseInt(document.getElementById('mb_max').value) || 3, max_days_allowed: parseInt(document.getElementById('mb_days').value) || 14 });
        showToast('Member registered!'); document.getElementById('memberModal').style.display = 'none'; loadMembers();
      } catch (e) { showToast('Error: ' + e.message, 'error'); }
    }

    async function loadMembers() {
      if (!schoolId) return;
      try {
        const r = await LibraryAPI.getMembers(schoolId); const members = r?.data || [];
        const hdrs = ['Member ID', 'Name', 'Type', 'Books Issued', 'Overdue', 'Max Allowed', 'Loan Days'];
        const rows = members.map(m => `
      <td class="px-4 py-3 font-mono text-sm text-blue-600 font-semibold">${m.member_id}</td>
      <td class="px-4 py-3 font-medium text-gray-900 text-sm">${m.name}</td>
      <td class="px-4 py-3">${tdBadge(m.member_type, m.member_type === 'Student' ? 'blue' : 'purple')}</td>
      <td class="px-4 py-3 text-center text-sm">${m.books_issued}</td>
      <td class="px-4 py-3 text-center"><span class="${m.overdue_books > 0 ? 'text-red-600 font-bold' : ''}">${m.overdue_books}</span></td>
      <td class="px-4 py-3 text-center text-sm">${m.max_books_allowed}</td>
      <td class="px-4 py-3 text-center text-sm">${m.max_days_allowed} days</td>
    `);
        document.getElementById('memberTable').innerHTML = buildTable(hdrs, rows, 'No members registered');
      } catch (e) { }
    }

    const dbLoadBooks = debounce(() => loadBooks(1));
    document.getElementById('bookSearch').addEventListener('input', dbLoadBooks);
    document.getElementById('availableOnly').addEventListener('change', () => loadBooks(1));
    loadStats(); loadBooks();
  </script>
</body>

</html>
