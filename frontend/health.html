<!DOCTYPE html>
<html lang="en">

<head>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap"
    rel="stylesheet">
  <style>
    * {
      box-sizing: border-box
    }

    body {
      font-family: "DM Sans", sans-serif;
      background: #f0f2f8;
      color: #1e293b
    }

    h1,
    h2,
    h3,
    h4,
    .font-outfit {
      font-family: "Outfit", sans-serif
    }

    .finput {
      width: 100%;
      padding: .625rem .875rem;
      border-radius: .75rem;
      border: 1.5px solid #e2e8f0;
      background: #f0f2f8;
      font-size: .875rem;
      outline: none;
      transition: all .15s;
      color: #1e293b
    }

    .finput:focus {
      background: #fff;
      border-color: #6366f1;
      box-shadow: 0 0 0 3px rgba(99, 102, 241, .12)
    }

    .lbl {
      display: block;
      font-size: .8125rem;
      font-weight: 600;
      color: #475569;
      margin-bottom: .375rem
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      background: rgba(15, 23, 42, .55);
      backdrop-filter: blur(4px)
    }

    .modal-box {
      background: #fff;
      border-radius: 1.5rem;
      box-shadow: 0 25px 50px rgba(0, 0, 0, .22);
      width: 100%;
      overflow: hidden;
      animation: modalIn .2s ease
    }

    @keyframes modalIn {
      from {
        opacity: 0;
        transform: scale(.96) translateY(6px)
      }

      to {
        opacity: 1;
        transform: scale(1) translateY(0)
      }
    }

    .tab-bar {
      display: flex;
      border-bottom: 2px solid #f1f5f9;
      overflow-x: auto;
      gap: .25rem;
      padding: 0 1rem
    }

    .tab-bar::-webkit-scrollbar {
      display: none
    }

    .tab-btn {
      padding: .875rem 1.125rem;
      font-size: .8125rem;
      font-weight: 600;
      background: none;
      border: none;
      cursor: pointer;
      white-space: nowrap;
      color: #94a3b8;
      border-bottom: 2.5px solid transparent;
      margin-bottom: -2px;
      transition: all .15s;
      font-family: "DM Sans", sans-serif
    }

    .tab-btn.active {
      color: #6366f1;
      border-bottom-color: #6366f1
    }

    .tab-btn:not(.active):hover {
      color: #475569
    }

    ::-webkit-scrollbar {
      width: 5px;
      height: 5px
    }

    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 999px
    }
  </style>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Health - EduManage Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .finput {
      width: 100%;
      padding: .625rem .75rem;
      border-radius: .75rem;
      border: 1px solid #e5e7eb;
      background: #f9fafb;
      font-size: .875rem;
      outline: none
    }

    .finput:focus {
      background: #fff;
      border-color: #3b82f6
    }

    .lbl {
      display: block;
      font-size: .875rem;
      font-weight: 500;
      color: #374151;
      margin-bottom: .375rem
    }
  </style>
</head>

<body>
  <div class="min-h-screen">
    <div id="sidebarContainer"></div>
    <main class="min-h-screen lg:ml-[260px]">
      <div id="topbarContainer"></div>
      <div class="p-6 space-y-6">
        <div
          style="background:#fff;border-radius:1.25rem;border:1.5px solid #f1f5f9;box-shadow:0 1px 3px rgba(0,0,0,.04)">
          <div class="tab-bar">
            <button onclick="switchTab(0)"
              class="htab px-5 py-4 text-sm font-semibold border-b-2 border-blue-600 text-blue-600 whitespace-nowrap">Medical
              Visits</button>
            <button onclick="switchTab(1)"
              class="htab px-5 py-4 text-sm font-semibold border-b-2 border-transparent text-gray-500 hover:text-gray-700 whitespace-nowrap">Health
              Records</button>
            <button onclick="switchTab(2)"
              class="htab px-5 py-4 text-sm font-semibold border-b-2 border-transparent text-gray-500 hover:text-gray-700 whitespace-nowrap">Health
              Alerts</button>
          </div>
          <!-- Medical Visits -->
          <div id="htab0" class="p-5">
            <div class="flex justify-between mb-4">
              <h4 class="font-bold text-gray-900">Medical Visits</h4>
              <button onclick="document.getElementById('visitModal').style.display='flex';loadVisitStudents()"
                class="px-4 py-2 bg-blue-600 text-white rounded-xl text-sm font-medium hover:bg-blue-700">+ Record
                Visit</button>
            </div>
            <div class="flex gap-2 mb-4">
              <label
                class="flex items-center gap-1 text-sm cursor-pointer px-3 py-2 rounded-xl border border-gray-200 bg-gray-50"><input
                  type="checkbox" id="emergencyOnly" class="accent-red-600" onchange="loadVisits()" /><span
                  class="text-red-600 font-medium">Emergency only</span></label>
            </div>
            <div id="visitsTable"></div>
          </div>
          <!-- Health Records -->
          <div id="htab1" class="p-5 hidden">
            <div class="flex items-center gap-4 mb-4">
              <div class="flex-1"><input id="hrSearch" type="text" placeholder="Search student..."
                  class="px-4 py-2.5 rounded-xl border border-gray-200 bg-gray-50 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm w-full" />
              </div>
              <button onclick="document.getElementById('healthModal').style.display='flex';loadHealthStudents()"
                class="px-4 py-2 bg-blue-600 text-white rounded-xl text-sm font-medium hover:bg-blue-700 whitespace-nowrap">+
                Add Record</button>
            </div>
            <p class="text-sm text-gray-500 text-center py-8">Select a student to view their health record, or add a new
              one.</p>
          </div>
          <!-- Alerts -->
          <div id="htab2" class="p-5 hidden">
            <div class="flex justify-between mb-4">
              <h4 class="font-bold text-gray-900">Health Alerts</h4>
              <button onclick="document.getElementById('alertModal').style.display='flex'"
                class="px-4 py-2 bg-red-600 text-white rounded-xl text-sm font-medium hover:bg-red-700">+ Create
                Alert</button>
            </div>
            <div id="alertsTable"></div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Visit Modal -->
  <div id="visitModal" class="modal-overlay" style="display:none">
    <div class="modal-box w-full max-w-lg max-h-[90vh] overflow-y-auto">
      <div class="flex justify-between items-center px-6 py-4 border-b">
        <h3 class="font-bold text-gray-900">Record Medical Visit</h3><button
          onclick="document.getElementById('visitModal').style.display='none'"
          class="text-gray-400 hover:text-gray-600 text-xl px-2">×</button>
      </div>
      <div class="px-6 py-5 space-y-4">
        <div><label class="lbl">Student *</label><select id="vs_student" class="finput">
            <option value="">Select student</option>
          </select></div>
        <div><label class="lbl">Complaint *</label><input id="vs_complaint" class="finput"
            placeholder="Main complaint" /></div>
        <div class="grid grid-cols-3 gap-3">
          <div><label class="lbl">Temperature (°C)</label><input id="vs_temp" type="number" step="0.1" class="finput"
              placeholder="98.6" /></div>
          <div><label class="lbl">BP (Sys/Dia)</label><input id="vs_bp" class="finput" placeholder="120/80" /></div>
          <div><label class="lbl">Pulse Rate</label><input id="vs_pulse" type="number" class="finput"
              placeholder="72" /></div>
        </div>
        <div><label class="lbl">Diagnosis</label><input id="vs_diag" class="finput" placeholder="Diagnosis" /></div>
        <div><label class="lbl">Treatment Given</label><textarea id="vs_treatment" rows="2" class="finput resize-none"
            placeholder="Treatment/medicines given"></textarea></div>
        <div><label class="lbl">Referred To (if any)</label><input id="vs_refer" class="finput"
            placeholder="Doctor/Hospital name" /></div>
        <div><label class="lbl">Attended By</label><input id="vs_by" class="finput" placeholder="School nurse/doctor" />
        </div>
        <div class="flex gap-4">
          <label class="flex items-center gap-2"><input type="checkbox" id="vs_emergency"
              class="accent-red-600 w-4 h-4" /><span
              class="text-sm text-gray-700 font-medium text-red-600">Emergency</span></label>
          <label class="flex items-center gap-2"><input type="checkbox" id="vs_hospital"
              class="accent-orange-600 w-4 h-4" /><span class="text-sm text-gray-700">Hospitalized</span></label>
        </div>
        <div><label class="lbl">Follow-up Date</label><input id="vs_followup" type="date" class="finput" /></div>
      </div>
      <div class="flex gap-3 px-6 py-4 border-t justify-end">
        <button onclick="document.getElementById('visitModal').style.display='none'"
          class="px-5 py-2.5 bg-gray-100 text-gray-700 rounded-xl text-sm">Cancel</button>
        <button onclick="saveVisit()"
          class="px-5 py-2.5 bg-blue-600 text-white rounded-xl text-sm font-medium">Save</button>
      </div>
    </div>
  </div>

  <!-- Health Record Modal -->
  <div id="healthModal" class="modal-overlay" style="display:none">
    <div class="modal-box w-full max-w-lg max-h-[90vh] overflow-y-auto">
      <div class="flex justify-between items-center px-6 py-4 border-b">
        <h3 class="font-bold text-gray-900">Add Health Record</h3><button
          onclick="document.getElementById('healthModal').style.display='none'"
          class="text-gray-400 hover:text-gray-600 text-xl px-2">×</button>
      </div>
      <div class="px-6 py-5 space-y-4">
        <div><label class="lbl">Student *</label><select id="hr_student" class="finput">
            <option value="">Select student</option>
          </select></div>
        <div class="grid grid-cols-3 gap-3">
          <div><label class="lbl">Height (cm)</label><input id="hr_height" type="number" class="finput"
              placeholder="150" /></div>
          <div><label class="lbl">Weight (kg)</label><input id="hr_weight" type="number" class="finput"
              placeholder="50" /></div>
          <div><label class="lbl">Blood Group</label><select id="hr_bg" class="finput">
              <option value="">Select</option>
              <option>A+</option>
              <option>A-</option>
              <option>B+</option>
              <option>B-</option>
              <option>O+</option>
              <option>O-</option>
              <option>AB+</option>
              <option>AB-</option>
            </select></div>
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div><label class="lbl">Vision Left</label><input id="hr_vl" class="finput" placeholder="e.g. 6/6" /></div>
          <div><label class="lbl">Vision Right</label><input id="hr_vr" class="finput" placeholder="e.g. 6/6" /></div>
        </div>
        <div><label class="lbl">Allergies (comma separated)</label><input id="hr_allergy" class="finput"
            placeholder="e.g. Peanuts, Dust, Pollen" /></div>
        <div><label class="lbl">Chronic Conditions</label><input id="hr_chronic" class="finput"
            placeholder="e.g. Asthma, Diabetes" /></div>
        <div><label class="lbl">Emergency Contact</label><input id="hr_ec_name" class="finput" placeholder="Name" />
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div><label class="lbl">Emergency Phone</label><input id="hr_ec_ph" class="finput" placeholder="Phone" />
          </div>
          <div><label class="lbl">Doctor Name</label><input id="hr_doc" class="finput" placeholder="Doctor name" />
          </div>
        </div>
        <div><label class="lbl">Last Checkup Date</label><input id="hr_chk" type="date" class="finput" /></div>
      </div>
      <div class="flex gap-3 px-6 py-4 border-t justify-end">
        <button onclick="document.getElementById('healthModal').style.display='none'"
          class="px-5 py-2.5 bg-gray-100 text-gray-700 rounded-xl text-sm">Cancel</button>
        <button onclick="saveHealthRecord()"
          class="px-5 py-2.5 bg-blue-600 text-white rounded-xl text-sm font-medium">Save</button>
      </div>
    </div>
  </div>

  <!-- Alert Modal -->
  <div id="alertModal" class="modal-overlay" style="display:none">
    <div class="modal-box w-full max-w-md">
      <div class="flex justify-between items-center px-6 py-4 border-b">
        <h3 class="font-bold text-gray-900">Create Health Alert</h3><button
          onclick="document.getElementById('alertModal').style.display='none'"
          class="text-gray-400 hover:text-gray-600 text-xl px-2">×</button>
      </div>
      <div class="px-6 py-5 space-y-4">
        <div><label class="lbl">Title *</label><input id="al_title" class="finput" placeholder="Alert title" /></div>
        <div class="grid grid-cols-2 gap-4">
          <div><label class="lbl">Type *</label><select id="al_type" class="finput">
              <option value="General Advisory">General Advisory</option>
              <option value="Epidemic">Epidemic</option>
              <option value="Outbreak">Outbreak</option>
              <option value="Vaccination Drive">Vaccination Drive</option>
            </select></div>
          <div><label class="lbl">Severity</label><select id="al_sev" class="finput">
              <option value="Low">Low</option>
              <option value="Medium">Medium</option>
              <option value="High">High</option>
              <option value="Critical">Critical</option>
            </select></div>
        </div>
        <div><label class="lbl">Description</label><textarea id="al_desc" rows="3" class="finput resize-none"
            placeholder="Alert details"></textarea></div>
        <div><label class="lbl">Affected Students Count</label><input id="al_count" type="number" class="finput"
            placeholder="0" /></div>
      </div>
      <div class="flex gap-3 px-6 py-4 border-t justify-end">
        <button onclick="document.getElementById('alertModal').style.display='none'"
          class="px-5 py-2.5 bg-gray-100 text-gray-700 rounded-xl text-sm">Cancel</button>
        <button onclick="saveAlert()" class="px-5 py-2.5 bg-red-600 text-white rounded-xl text-sm font-medium">Create
          Alert</button>
      </div>
    </div>
  </div>

  <div id="toast" class="hidden fixed bottom-6 right-6 z-50 px-6 py-3 rounded-xl text-white font-medium shadow-2xl">
  </div>
  <script src="js/api.js"></script>
  <script src="js/layout.js"></script>
  <script>
    requireAuth();
    document.getElementById('sidebarContainer').innerHTML = renderSidebar('health');
    document.getElementById('topbarContainer').innerHTML = renderTopbar('Health & Medical', 'Student and staff health management');
    const schoolId = localStorage.getItem('school_id');

    function switchTab(idx) {
      document.querySelectorAll('.htab').forEach((b, i) => { b.classList.toggle('border-blue-600', i === idx); b.classList.toggle('text-blue-600', i === idx); b.classList.toggle('border-transparent', i !== idx); b.classList.toggle('text-gray-500', i !== idx); });
      document.querySelectorAll('[id^="htab"]').forEach(t => { t.classList.toggle('hidden', parseInt(t.id.replace('htab', '')) !== idx); });
      if (idx === 0) loadVisits(); if (idx === 2) loadAlerts();
    }

    async function loadVisitStudents() {
      if (!schoolId) return;
      try { const r = await StudentAPI.list({ school_id: schoolId, per_page: 200 }); document.getElementById('vs_student').innerHTML = '<option value="">Select student</option>' + (r?.data || []).map(s => `<option value="${s.id}">${s.full_name} (${s.admission_no})</option>`).join(''); } catch (e) { }
    }

    async function loadHealthStudents() {
      if (!schoolId) return;
      try { const r = await StudentAPI.list({ school_id: schoolId, per_page: 200 }); const opts = '<option value="">Select student</option>' + (r?.data || []).map(s => `<option value="${s.id}">${s.full_name}</option>`).join(''); document.getElementById('hr_student').innerHTML = opts; } catch (e) { }
    }

    async function loadVisits() {
      if (!schoolId) { document.getElementById('visitsTable').innerHTML = '<p class="text-gray-400 text-sm p-4">Configure school first</p>'; return; }
      const params = { school_id: schoolId };
      if (document.getElementById('emergencyOnly').checked) params.is_emergency = true;
      try {
        const r = await HealthAPI.getVisits(params); const visits = r?.data || [];
        const hdrs = ['Student', 'Complaint', 'Diagnosis', 'Temperature', 'Attended By', 'Emergency', 'Visit Date'];
        const rows = visits.map(v => `
      <td class="px-4 py-3 font-medium text-gray-900 text-sm">${v.student_name || '-'}</td>
      <td class="px-4 py-3 text-sm text-gray-700">${v.complaint}</td>
      <td class="px-4 py-3 text-sm text-gray-600">${v.diagnosis || '-'}</td>
      <td class="px-4 py-3 text-sm text-gray-600">${v.temperature ? v.temperature + '°C' : '-'}</td>
      <td class="px-4 py-3 text-sm text-gray-500">${v.attended_by || '-'}</td>
      <td class="px-4 py-3">${v.is_emergency ? '<span class="px-2 py-1 bg-red-100 text-red-700 rounded-lg text-xs font-bold">EMERGENCY</span>' : ''}</td>
      <td class="px-4 py-3 text-sm text-gray-500">${formatDate(v.visit_date)}</td>
    `);
        document.getElementById('visitsTable').innerHTML = buildTable(hdrs, rows, 'No medical visits recorded');
      } catch (e) { }
    }

    async function saveVisit() {
      if (!schoolId) { showToast('Configure school first', 'error'); return; }
      const stId = document.getElementById('vs_student').value, complaint = document.getElementById('vs_complaint').value.trim();
      if (!stId || !complaint) { showToast('Select student and enter complaint', 'error'); return; }
      const bp = document.getElementById('vs_bp').value.split('/');
      try {
        await HealthAPI.addVisit({ school_id: schoolId, student_id: stId, member_type: 'Student', complaint, temperature: parseFloat(document.getElementById('vs_temp').value) || null, bp_systolic: parseInt(bp[0]) || null, bp_diastolic: parseInt(bp[1]) || null, pulse_rate: parseInt(document.getElementById('vs_pulse').value) || null, diagnosis: document.getElementById('vs_diag').value || null, treatment_given: document.getElementById('vs_treatment').value || null, referred_to: document.getElementById('vs_refer').value || null, attended_by: document.getElementById('vs_by').value || null, is_emergency: document.getElementById('vs_emergency').checked, is_hospitalized: document.getElementById('vs_hospital').checked, follow_up_date: document.getElementById('vs_followup').value || null });
        showToast('Medical visit recorded!'); document.getElementById('visitModal').style.display = 'none'; loadVisits();
      } catch (e) { showToast('Error: ' + e.message, 'error'); }
    }

    async function saveHealthRecord() {
      if (!schoolId) { showToast('Configure school first', 'error'); return; }
      const stId = document.getElementById('hr_student').value;
      if (!stId) { showToast('Select student', 'error'); return; }
      const allergies = document.getElementById('hr_allergy').value.split(',').map(s => s.trim()).filter(Boolean);
      const chronic = document.getElementById('hr_chronic').value.split(',').map(s => s.trim()).filter(Boolean);
      try {
        const r = await HealthAPI.createRecord({ school_id: schoolId, student_id: stId, member_type: 'Student', height_cm: parseFloat(document.getElementById('hr_height').value) || null, weight_kg: parseFloat(document.getElementById('hr_weight').value) || null, blood_group: document.getElementById('hr_bg').value || null, vision_left: document.getElementById('hr_vl').value || null, vision_right: document.getElementById('hr_vr').value || null, allergies, chronic_conditions: chronic, emergency_contact_name: document.getElementById('hr_ec_name').value || null, emergency_contact_phone: document.getElementById('hr_ec_ph').value || null, doctor_name: document.getElementById('hr_doc').value || null, last_checkup_date: document.getElementById('hr_chk').value || null });
        showToast('Health record saved!' + (r.data.bmi ? ' BMI: ' + r.data.bmi : '')); document.getElementById('healthModal').style.display = 'none';
      } catch (e) { showToast('Error: ' + e.message, 'error'); }
    }

    async function loadAlerts() {
      if (!schoolId) { document.getElementById('alertsTable').innerHTML = '<p class="text-gray-400 text-sm p-4">Configure school first</p>'; return; }
      try {
        const r = await HealthAPI.getAlerts(schoolId); const alerts = r?.data || [];
        const hdrs = ['Title', 'Type', 'Severity', 'Affected', 'Created By', 'Date'];
        const rows = alerts.map(a => `
      <td class="px-4 py-3 font-medium text-gray-900 text-sm">${a.title}</td>
      <td class="px-4 py-3 text-sm text-gray-600">${a.alert_type}</td>
      <td class="px-4 py-3">${tdBadge(a.severity, a.severity === 'Low' ? 'green' : a.severity === 'Medium' ? 'yellow' : a.severity === 'High' ? 'orange' : 'red')}</td>
      <td class="px-4 py-3 text-center text-sm">${a.affected_count}</td>
      <td class="px-4 py-3 text-sm text-gray-500">${a.created_by || '-'}</td>
      <td class="px-4 py-3 text-sm text-gray-500">${formatDate(a.created_at)}</td>
    `);
        document.getElementById('alertsTable').innerHTML = buildTable(hdrs, rows, 'No health alerts');
      } catch (e) { }
    }

    async function saveAlert() {
      if (!schoolId) { showToast('Configure school first', 'error'); return; }
      const title = document.getElementById('al_title').value.trim();
      if (!title) { showToast('Title required', 'error'); return; }
      try {
        await HealthAPI.createAlert({ school_id: schoolId, alert_type: document.getElementById('al_type').value, title, description: document.getElementById('al_desc').value || null, severity: document.getElementById('al_sev').value, affected_count: parseInt(document.getElementById('al_count').value) || 0 });
        showToast('Health alert created!'); document.getElementById('alertModal').style.display = 'none'; loadAlerts();
      } catch (e) { showToast('Error: ' + e.message, 'error'); }
    }

    loadVisits();
  </script>
</body>

</html>
