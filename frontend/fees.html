<!DOCTYPE html>
<html lang="en">
<head>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box}
body{font-family:"DM Sans",sans-serif;background:#f0f2f8;color:#1e293b}
h1,h2,h3,h4,.font-outfit{font-family:"Outfit",sans-serif}
.finput{width:100%;padding:.625rem .875rem;border-radius:.75rem;border:1.5px solid #e2e8f0;background:#f0f2f8;font-size:.875rem;outline:none;transition:all .15s;color:#1e293b}
.finput:focus{background:#fff;border-color:#6366f1;box-shadow:0 0 0 3px rgba(99,102,241,.12)}
.lbl{display:block;font-size:.8125rem;font-weight:600;color:#475569;margin-bottom:.375rem}
.modal-overlay{position:fixed;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;padding:1rem;background:rgba(15,23,42,.55);backdrop-filter:blur(4px)}
.modal-box{background:#fff;border-radius:1.5rem;box-shadow:0 25px 50px rgba(0,0,0,.22);width:100%;overflow:hidden;animation:modalIn .2s ease}
@keyframes modalIn{from{opacity:0;transform:scale(.96) translateY(6px)}to{opacity:1;transform:scale(1) translateY(0)}}
.tab-bar{display:flex;border-bottom:2px solid #f1f5f9;overflow-x:auto;gap:.25rem;padding:0 1rem}
.tab-bar::-webkit-scrollbar{display:none}
.tab-btn{padding:.875rem 1.125rem;font-size:.8125rem;font-weight:600;background:none;border:none;cursor:pointer;white-space:nowrap;color:#94a3b8;border-bottom:2.5px solid transparent;margin-bottom:-2px;transition:all .15s;font-family:"DM Sans",sans-serif}
.tab-btn.active{color:#6366f1;border-bottom-color:#6366f1}
.tab-btn:not(.active):hover{color:#475569}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:999px}
.finput:focus{background:#fff;border-color:#3b82f6}
.lbl{display:block;font-size:.875rem;font-weight:500;color:#374151;margin-bottom:.375rem}
</style>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Fees - EduManage Pro</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body>
  <!-- ✅ Same layout pattern as students.html -->
  <div class="min-h-screen">
    <div id="sidebarContainer"></div>
    <main class="min-h-screen lg:ml-[260px]">
      <div id="topbarContainer"></div>
      <div class="p-6 space-y-6">

        <!-- Fee Stats -->
        <div id="feeStats" class="grid grid-cols-2 sm:grid-cols-4 gap-4"></div>

        <div style="background:#fff;border-radius:1.25rem;border:1.5px solid #f1f5f9;box-shadow:0 1px 3px rgba(0,0,0,.04)">
          <div class="tab-bar">
            <button onclick="switchFeeTab(0)" class="ftab px-5 py-4 text-sm font-semibold border-b-2 border-blue-600 text-blue-600 whitespace-nowrap">Invoices</button>
            <button onclick="switchFeeTab(1)" class="ftab px-5 py-4 text-sm font-semibold border-b-2 border-transparent text-gray-500 hover:text-gray-700 whitespace-nowrap">Collect Payment</button>
            <button onclick="switchFeeTab(2)" class="ftab px-5 py-4 text-sm font-semibold border-b-2 border-transparent text-gray-500 hover:text-gray-700 whitespace-nowrap">Fee Structure</button>
            <button onclick="switchFeeTab(3)" class="ftab px-5 py-4 text-sm font-semibold border-b-2 border-transparent text-gray-500 hover:text-gray-700 whitespace-nowrap">Dues Report</button>
          </div>

          <!-- Invoices -->
          <div id="ftab0" class="p-5">
            <div class="flex flex-col sm:flex-row gap-3 justify-between mb-4">
              <div class="flex gap-2 flex-wrap">
                <select id="invStatus" class="px-3 py-2.5 rounded-xl border border-gray-200 bg-gray-50 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                  <option value="">All Status</option><option value="Pending">Pending</option><option value="Partial">Partial</option><option value="Paid">Paid</option><option value="Overdue">Overdue</option>
                </select>
              </div>
              <button onclick="document.getElementById('invModal').style.display='flex';loadInvStudents()" class="px-5 py-2.5 bg-blue-600 text-white rounded-xl font-semibold text-sm hover:bg-blue-700 shadow-lg whitespace-nowrap">+ Create Invoice</button>
            </div>
            <div id="invTable"></div>
          </div>

          <!-- Collect Payment -->
          <div id="ftab1" class="p-5 hidden">
            <h4 class="font-bold text-gray-900 mb-5">Record Fee Payment</h4>
            <div class="max-w-lg space-y-4">
              <div><label class="lbl">Student *</label><select id="pay_student" class="finput" onchange="loadStudentInvoices()"><option value="">Select student</option></select></div>
              <div><label class="lbl">Invoice *</label><select id="pay_invoice" class="finput"><option value="">Select invoice</option></select></div>
              <div id="invoiceDetails" class="hidden bg-blue-50 rounded-xl p-4 text-sm">
                <div class="flex justify-between mb-1"><span class="text-blue-700">Total Amount:</span><span id="inv_total" class="font-bold text-blue-900"></span></div>
                <div class="flex justify-between mb-1"><span class="text-blue-700">Paid:</span><span id="inv_paid" class="font-bold text-emerald-700"></span></div>
                <div class="flex justify-between"><span class="text-blue-700">Balance:</span><span id="inv_bal" class="font-bold text-red-600"></span></div>
              </div>
              <div><label class="lbl">Amount (₹) *</label><input id="pay_amount" type="number" class="finput" placeholder="Enter amount"/></div>
              <div><label class="lbl">Payment Mode *</label>
                <select id="pay_mode" class="finput"><option value="Cash">Cash</option><option value="Online">Online</option><option value="Cheque">Cheque</option><option value="UPI">UPI</option><option value="NEFT">NEFT</option><option value="Card">Card</option></select>
              </div>
              <div><label class="lbl">Remarks</label><input id="pay_remarks" class="finput" placeholder="Optional remarks"/></div>
              <button onclick="collectPayment()" class="px-6 py-3 bg-emerald-600 text-white rounded-xl font-semibold hover:bg-emerald-700 shadow-lg text-sm w-full">Collect Payment</button>
            </div>
          </div>

          <!-- Fee Structure -->
          <div id="ftab2" class="p-5 hidden">
            <div class="flex justify-between mb-4">
              <h4 class="font-bold text-gray-900">Fee Structures</h4>
              <button onclick="document.getElementById('structModal').style.display='flex';loadStructCats()" class="px-4 py-2 bg-blue-600 text-white rounded-xl text-sm font-medium">+ Create Structure</button>
            </div>
            <div id="structTable"></div>
          </div>

          <!-- Dues -->
          <div id="ftab3" class="p-5 hidden">
            <div class="flex justify-between mb-4">
              <h4 class="font-bold text-gray-900">Fee Dues Report</h4>
              <button onclick="loadDues()" class="px-4 py-2 bg-blue-600 text-white rounded-xl text-sm font-medium">Refresh</button>
            </div>
            <div id="duesTable"></div>
          </div>
        </div>

      </div>
    </main>
  </div>

  <!-- Invoice Modal -->
  <div id="invModal" class="modal-overlay" style="display:none">
    <div class="modal-box w-full max-w-lg">
      <div class="flex justify-between items-center px-6 py-4 border-b"><h3 class="font-bold text-gray-900">Create Invoice</h3><button onclick="document.getElementById('invModal').style.display='none'" class="p-2 text-gray-400 hover:text-gray-600 rounded-xl text-lg">×</button></div>
      <div class="px-6 py-5 space-y-4">
        <div><label class="lbl">Student *</label><select id="inv_student" class="finput" onchange="loadInvoiceStudentMeta()"><option value="">Select student</option></select></div>
        <div><label class="lbl">Fee Structure</label><select id="inv_structure" class="finput"><option value="">Select fee structure</option></select></div>
        <label class="flex items-center gap-2"><input id="inv_transport_toggle" type="checkbox" class="w-4 h-4 accent-blue-600" /><span class="text-sm text-gray-700">Include transport fee from student route</span></label>
        <div id="inv_transport_meta" class="hidden bg-blue-50 rounded-xl p-4 text-sm text-blue-900"></div>
        <div>
          <label class="lbl">Transport Months</label>
          <div class="grid grid-cols-3 sm:grid-cols-4 gap-2 text-sm text-gray-700">
            <label class="flex items-center gap-2"><input type="checkbox" class="inv_month w-4 h-4 accent-blue-600" value="Apr" />Apr</label>
            <label class="flex items-center gap-2"><input type="checkbox" class="inv_month w-4 h-4 accent-blue-600" value="May" />May</label>
            <label class="flex items-center gap-2"><input type="checkbox" class="inv_month w-4 h-4 accent-blue-600" value="Jun" />Jun</label>
            <label class="flex items-center gap-2"><input type="checkbox" class="inv_month w-4 h-4 accent-blue-600" value="Jul" />Jul</label>
            <label class="flex items-center gap-2"><input type="checkbox" class="inv_month w-4 h-4 accent-blue-600" value="Aug" />Aug</label>
            <label class="flex items-center gap-2"><input type="checkbox" class="inv_month w-4 h-4 accent-blue-600" value="Sep" />Sep</label>
            <label class="flex items-center gap-2"><input type="checkbox" class="inv_month w-4 h-4 accent-blue-600" value="Oct" />Oct</label>
            <label class="flex items-center gap-2"><input type="checkbox" class="inv_month w-4 h-4 accent-blue-600" value="Nov" />Nov</label>
            <label class="flex items-center gap-2"><input type="checkbox" class="inv_month w-4 h-4 accent-blue-600" value="Dec" />Dec</label>
            <label class="flex items-center gap-2"><input type="checkbox" class="inv_month w-4 h-4 accent-blue-600" value="Jan" />Jan</label>
            <label class="flex items-center gap-2"><input type="checkbox" class="inv_month w-4 h-4 accent-blue-600" value="Feb" />Feb</label>
            <label class="flex items-center gap-2"><input type="checkbox" class="inv_month w-4 h-4 accent-blue-600" value="Mar" />Mar</label>
          </div>
        </div>
        <div><label class="lbl">Due Date</label><input id="inv_due" type="date" class="finput"/></div>
        <div id="invItemsContainer">
          <label class="lbl">Fee Items</label>
          <div id="invItems" class="space-y-2">
            <div class="flex gap-2 items-center">
              <input type="text" placeholder="Description" class="inv-desc finput flex-1" />
              <input type="number" placeholder="Amount" class="inv-amt finput w-32" />
              <button onclick="removeInvItem(this)" class="text-red-400 hover:text-red-600 text-lg px-2">×</button>
            </div>
          </div>
          <button onclick="addInvItem()" class="mt-2 text-blue-600 text-sm hover:underline font-medium">+ Add Item</button>
        </div>
        <div><label class="lbl">Discount (₹)</label><input id="inv_disc" type="number" class="finput" value="0"/></div>
        <div><label class="lbl">Remarks</label><input id="inv_rem" class="finput" placeholder="Remarks"/></div>
      </div>
      <div class="flex gap-3 px-6 py-4 border-t justify-end">
        <button onclick="document.getElementById('invModal').style.display='none'" class="px-5 py-2.5 bg-gray-100 text-gray-700 rounded-xl text-sm">Cancel</button>
        <button onclick="createInvoice()" class="px-5 py-2.5 bg-blue-600 text-white rounded-xl text-sm font-medium">Create</button>
      </div>
    </div>
  </div>

  <!-- Fee Structure Modal -->
  <div id="structModal" class="modal-overlay" style="display:none">
    <div class="modal-box w-full max-w-md">
      <div class="flex justify-between items-center px-6 py-4 border-b"><h3 class="font-bold text-gray-900">Create Fee Structure</h3><button onclick="document.getElementById('structModal').style.display='none'" class="p-2 text-gray-400 hover:text-gray-600 rounded-xl text-lg">×</button></div>
      <div class="px-6 py-5 space-y-4">
        <div><label class="lbl">Structure Name *</label><input id="str_name" class="finput" placeholder="e.g. Class 10 Fee 2024-25"/></div>
        <div><label class="lbl">Class *</label><select id="str_cls" class="finput"><option value="">Select class</option></select></div>
        <div><label class="lbl">Installments</label><select id="str_inst" class="finput"><option value="1">Annual (1 payment)</option><option value="2">Half-yearly (2 payments)</option><option value="4">Quarterly (4 payments)</option><option value="12">Monthly (12 payments)</option></select></div>
        <div><label class="lbl">Late Fee per Day (₹)</label><input id="str_late" type="number" class="finput" value="0"/></div>
        <div id="strCatItems" class="space-y-2">
          <label class="lbl">Fee Categories</label>
        </div>
      </div>
      <div class="flex gap-3 px-6 py-4 border-t justify-end">
        <button onclick="document.getElementById('structModal').style.display='none'" class="px-5 py-2.5 bg-gray-100 text-gray-700 rounded-xl text-sm">Cancel</button>
        <button onclick="createFeeStructure()" class="px-5 py-2.5 bg-blue-600 text-white rounded-xl text-sm font-medium">Save</button>
      </div>
    </div>
  </div>

  <div id="toast" class="hidden fixed bottom-6 right-6 z-50 px-6 py-3 rounded-xl text-white font-medium shadow-2xl"></div>

  <script src="js/api.js"></script>
  <script src="js/layout.js"></script>
  <script>
    requireAuth();
    document.getElementById('sidebarContainer').innerHTML = renderSidebar('fees');
    document.getElementById('topbarContainer').innerHTML = renderTopbar('Fees Management', 'Manage fees, invoices and payments');
    const schoolId = localStorage.getItem('school_id'), ayId = localStorage.getItem('ay_id');
    let feeCats = [], feeStructCats = [];
    let invoiceStudents = {};
    let feeStructures = [];

    function switchFeeTab(idx) {
      document.querySelectorAll('.ftab').forEach((b, i) => {
        b.classList.toggle('border-blue-600', i === idx);
        b.classList.toggle('text-blue-600', i === idx);
        b.classList.toggle('border-transparent', i !== idx);
        b.classList.toggle('text-gray-500', i !== idx);
      });
      document.querySelectorAll('[id^="ftab"]').forEach(t => {
        t.classList.toggle('hidden', parseInt(t.id.replace('ftab', '')) !== idx);
      });
      if (idx === 0) loadInvoices();
      if (idx === 1) loadPayStudents();
      if (idx === 2) loadStructures();
      if (idx === 3) loadDues();
    }

    async function loadFeeStats() {
      if (!schoolId) return;
      try {
        const r = await FeesAPI.getSummary(schoolId); const d = r?.data || {};
        document.getElementById('feeStats').innerHTML =
          statCard('Total Billed', formatCurrency(d.total_billed || 0), '&#128179;', 'blue') +
          statCard('Collected', formatCurrency(d.total_collected || 0), '&#9989;', 'green') +
          statCard('Pending', formatCurrency(d.total_due || 0), '&#9203;', 'orange') +
          statCard('Collection Rate', (d.collection_rate || 0) + '%', '&#128200;', 'purple');
      } catch (e) {}
    }

    async function loadInvStudents() {
      if (!schoolId) return;
      try {
        const r = await StudentAPI.list({ school_id: schoolId, per_page: 200 });
        const students = r?.data || [];
        invoiceStudents = {};
        students.forEach(s => invoiceStudents[s.id] = s);
        document.getElementById('inv_student').innerHTML = '<option value="">Select student</option>' +
          students.map(s => `<option value="${s.id}">${s.full_name} (${s.admission_no})</option>`).join('');
        await loadInvoiceStructures();
      } catch (e) {}
    }

    async function loadInvoiceStructures() {
      if (!schoolId) return;
      try {
        const r = await FeesAPI.getStructures({ school_id: schoolId, academic_year_id: ayId || '' });
        feeStructures = r?.data || [];
        document.getElementById('inv_structure').innerHTML = '<option value="">Select fee structure</option>' +
          feeStructures.map(s => `<option value="${s.id}">${s.name} (${s.classroom || 'All'})</option>`).join('');
      } catch (e) {}
    }

    async function loadInvoiceStudentMeta() {
      const studId = document.getElementById('inv_student').value;
      document.querySelectorAll('.inv_month').forEach(cb => cb.checked = false);
      document.getElementById('inv_transport_toggle').checked = false;
      document.getElementById('inv_transport_meta').classList.add('hidden');
      if (!studId) return;
      try {
        const r = await StudentAPI.get(studId);
        const s = r?.data;
        if (!s) return;
        (s.transport_months || []).forEach(month => {
          const box = document.querySelector(`.inv_month[value="${month}"]`);
          if (box) box.checked = true;
        });
        const matching = feeStructures.find(fs => fs.classroom === s.classroom_name);
        document.getElementById('inv_structure').value = matching?.id || '';
        if (s.transport_route_name) {
          document.getElementById('inv_transport_toggle').checked = true;
          document.getElementById('inv_transport_meta').classList.remove('hidden');
          const months = (s.transport_months || []).join(', ') || 'No months selected';
          document.getElementById('inv_transport_meta').innerHTML = `
            <div class="flex justify-between"><span>Route</span><span class="font-semibold">${s.transport_route_name}</span></div>
            <div class="flex justify-between mt-1"><span>Charge / Month</span><span class="font-semibold">${formatCurrency(s.transport_fee_per_month || 0)}</span></div>
            <div class="flex justify-between mt-1"><span>Default Months</span><span class="font-semibold">${months}</span></div>`;
        }
      } catch (e) {}
    }

    function addInvItem() {
      const c = document.createElement('div'); c.className = 'flex gap-2 items-center';
      c.innerHTML = '<input type="text" placeholder="Description" class="inv-desc finput flex-1"/><input type="number" placeholder="Amount" class="inv-amt finput w-32"/><button onclick="removeInvItem(this)" class="text-red-400 hover:text-red-600 text-lg px-2">×</button>';
      document.getElementById('invItems').appendChild(c);
    }
    function removeInvItem(btn) { btn.parentElement.remove(); }

    async function createInvoice() {
      if (!schoolId || !ayId) { showToast('Configure school and academic year', 'error'); return; }
      const studId = document.getElementById('inv_student').value;
      if (!studId) { showToast('Select student', 'error'); return; }
      const descs = document.querySelectorAll('.inv-desc'), amts = document.querySelectorAll('.inv-amt');
      const items = [];
      descs.forEach((d, i) => { if (d.value.trim() && amts[i]?.value) { items.push({ category: d.value.trim(), description: d.value.trim(), amount: parseFloat(amts[i].value) }); } });
      const feeStructureId = document.getElementById('inv_structure').value || null;
      const transportMonths = Array.from(document.querySelectorAll('.inv_month:checked')).map(el => el.value);
      if (!items.length && !feeStructureId) { showToast('Add at least one fee item or choose a fee structure', 'error'); return; }
      try {
        const r = await FeesAPI.createInvoice({
          school_id: schoolId,
          student_id: studId,
          academic_year_id: ayId,
          fee_structure_id: feeStructureId,
          include_transport: document.getElementById('inv_transport_toggle').checked,
          transport_months: transportMonths,
          items,
          due_date: document.getElementById('inv_due').value ? new Date(document.getElementById('inv_due').value).toISOString() : null,
          discount_amount: parseFloat(document.getElementById('inv_disc').value) || 0,
          remarks: document.getElementById('inv_rem').value || null
        });
        showToast('Invoice ' + r.data.invoice_no + ' created! Net: ' + formatCurrency(r.data.net_amount));
        document.getElementById('invModal').style.display = 'none'; loadInvoices(); loadFeeStats();
      } catch (e) { showToast('Error: ' + e.message, 'error'); }
    }

    async function loadInvoices() {
      if (!schoolId) { document.getElementById('invTable').innerHTML = '<div class="text-center py-8 text-gray-400">Configure school first</div>'; return; }
      const params = { school_id: schoolId, per_page: 20 };
      const stat = document.getElementById('invStatus').value; if (stat) params.status = stat;
      if (ayId) params.academic_year_id = ayId;
      try {
        const r = await FeesAPI.getInvoices(params); const invs = r?.data || [];
        const hdrs = ['Invoice No', 'Student', 'Net Amount', 'Paid', 'Balance', 'Due Date', 'Status', ''];
        const rows = invs.map(inv => `
          <td class="px-4 py-3 font-mono text-xs text-gray-600">${inv.invoice_no}</td>
          <td class="px-4 py-3 font-medium text-gray-900 text-sm">${inv.student_name || '-'}</td>
          <td class="px-4 py-3 text-sm font-medium">${formatCurrency(inv.net_amount)}</td>
          <td class="px-4 py-3 text-sm text-emerald-600 font-medium">${formatCurrency(inv.paid_amount)}</td>
          <td class="px-4 py-3 text-sm text-red-500 font-medium">${formatCurrency(inv.balance_amount)}</td>
          <td class="px-4 py-3 text-sm text-gray-600">${formatDate(inv.due_date)}</td>
          <td class="px-4 py-3">${tdBadge(inv.status, inv.status === 'Paid' ? 'green' : inv.status === 'Partial' ? 'yellow' : inv.status === 'Overdue' ? 'red' : 'orange')}</td>
          <td class="px-4 py-3"><button onclick="viewInvoice('${inv.id}')" class="text-xs text-blue-600 hover:underline">View</button></td>
        `);
        document.getElementById('invTable').innerHTML = buildTable(hdrs, rows, 'No invoices found');
      } catch (e) { document.getElementById('invTable').innerHTML = `<div class="text-center py-8 text-red-400">Error: ${e.message}</div>`; }
    }

    async function viewInvoice(id) {
      try {
        const r = await FeesAPI.getInvoice(id); const inv = r.data;
        alert('Invoice: ' + inv.invoice_no + '\nStudent: ' + inv.student_name + '\nNet: ' + formatCurrency(inv.net_amount) + '\nPaid: ' + formatCurrency(inv.paid_amount) + '\nBalance: ' + formatCurrency(inv.balance_amount) + '\nStatus: ' + inv.status);
      } catch (e) { showToast('Error: ' + e.message, 'error'); }
    }

    async function loadPayStudents() {
      if (!schoolId) return;
      try {
        const r = await StudentAPI.list({ school_id: schoolId, per_page: 200 });
        document.getElementById('pay_student').innerHTML = '<option value="">Select student</option>' +
          (r?.data || []).map(s => `<option value="${s.id}">${s.full_name} (${s.admission_no})</option>`).join('');
      } catch (e) {}
    }

    async function loadStudentInvoices() {
      const studId = document.getElementById('pay_student').value;
      document.getElementById('pay_invoice').innerHTML = '<option value="">Select invoice</option>';
      document.getElementById('invoiceDetails').style.display = 'none';
      if (!studId) return;
      try {
        const r = await FeesAPI.getInvoices({ school_id: schoolId, student_id: studId, per_page: 50 });
        (r?.data || []).filter(inv => inv.status !== 'Paid').forEach(inv => {
          document.getElementById('pay_invoice').innerHTML += `<option value="${inv.id}" data-total="${inv.net_amount}" data-paid="${inv.paid_amount}" data-bal="${inv.balance_amount}">${inv.invoice_no} - Balance: ${formatCurrency(inv.balance_amount)}</option>`;
        });
        document.getElementById('pay_invoice').addEventListener('change', function () {
          const opt = this.options[this.selectedIndex];
          if (!opt.value) { document.getElementById('invoiceDetails').style.display = 'none'; return; }
          document.getElementById('inv_total').textContent = formatCurrency(opt.dataset.total);
          document.getElementById('inv_paid').textContent = formatCurrency(opt.dataset.paid);
          document.getElementById('inv_bal').textContent = formatCurrency(opt.dataset.bal);
          document.getElementById('pay_amount').value = opt.dataset.bal;
          document.getElementById('invoiceDetails').style.display = 'flex';
        });
      } catch (e) {}
    }

    async function collectPayment() {
      if (!schoolId) { showToast('Configure school first', 'error'); return; }
      const studId = document.getElementById('pay_student').value, invId = document.getElementById('pay_invoice').value;
      const amount = parseFloat(document.getElementById('pay_amount').value);
      if (!studId || !invId || !amount) { showToast('Fill all required fields', 'error'); return; }
      try {
        const r = await FeesAPI.recordPayment({ school_id: schoolId, student_id: studId, invoice_id: invId, amount, payment_mode: document.getElementById('pay_mode').value, remarks: document.getElementById('pay_remarks').value || null });
        showToast('Payment recorded! Receipt: ' + r.data.receipt_no + ' | Balance: ' + formatCurrency(r.data.balance));
        loadInvoices(); loadFeeStats();
        document.getElementById('pay_invoice').value = ''; document.getElementById('invoiceDetails').style.display = 'none';
      } catch (e) { showToast('Error: ' + e.message, 'error'); }
    }

    async function loadStructCats() {
      if (!schoolId) return;
      try {
        const [cr, catr] = await Promise.allSettled([ClassAPI.list(schoolId, ayId), FeesAPI.getCategories(schoolId)]);
        if (cr.status === 'fulfilled') document.getElementById('str_cls').innerHTML = '<option value="">Select class</option>' + (cr.value?.data || []).map(c => `<option value="${c.id}">${c.name}</option>`).join('');
        if (catr.status === 'fulfilled') {
          feeCats = catr.value?.data || [];
          if (!feeCats.length) {
            document.getElementById('strCatItems').innerHTML = '<label class="lbl">Fee Categories</label><p class="text-xs text-orange-600">No fee categories found. <button onclick="createDefaultCats()" class="underline">Create defaults</button></p>';
          } else {
            document.getElementById('strCatItems').innerHTML = '<label class="lbl">Fee Categories & Amounts</label>' + feeCats.map(c => `<div class="flex items-center gap-3"><div class="flex-1 text-sm font-medium text-gray-700">${c.name}</div><input type="number" id="cat_${c.id}" class="finput w-32" placeholder="Amount ₹"/></div>`).join('');
          }
        }
      } catch (e) {}
    }

    async function createDefaultCats() {
      if (!schoolId) return;
      const cats = [{ name: 'Tuition Fee', code: 'TUI' }, { name: 'Transport Fee', code: 'TRP' }, { name: 'Library Fee', code: 'LIB' }, { name: 'Lab Fee', code: 'LAB' }];
      try { for (const c of cats) await FeesAPI.createCategory({ school_id: schoolId, ...c }); showToast('Default categories created!'); loadStructCats(); } catch (e) {}
    }

    async function createFeeStructure() {
      if (!schoolId || !ayId) { showToast('Configure school and academic year', 'error'); return; }
      const name = document.getElementById('str_name').value.trim(), cls = document.getElementById('str_cls').value;
      if (!name || !cls) { showToast('Name and class required', 'error'); return; }
      const items = feeCats.map(c => { const amt = parseFloat(document.getElementById(`cat_${c.id}`)?.value) || 0; return amt > 0 ? { category_id: c.id, amount: amt } : null; }).filter(Boolean);
      if (!items.length) { showToast('Add at least one amount', 'error'); return; }
      try {
        await FeesAPI.createStructure({ school_id: schoolId, academic_year_id: ayId, classroom_id: cls, name, items, installments: parseInt(document.getElementById('str_inst').value) || 1, late_fee_per_day: parseFloat(document.getElementById('str_late').value) || 0 });
        showToast('Fee structure created!'); document.getElementById('structModal').style.display = 'none'; loadStructures();
      } catch (e) { showToast('Error: ' + e.message, 'error'); }
    }

    async function loadStructures() {
      if (!schoolId) { document.getElementById('structTable').innerHTML = '<p class="text-gray-400 text-sm p-4">Configure school first</p>'; return; }
      try {
        const r = await FeesAPI.getStructures({ school_id: schoolId, academic_year_id: ayId || '' }); const data = r?.data || [];
        const hdrs = ['Name', 'Class', 'Total Amount', 'Installments', 'Items'];
        const rows = data.map(s => `
          <td class="px-4 py-3 font-medium text-gray-900 text-sm">${s.name}</td>
          <td class="px-4 py-3 text-sm text-gray-600">${s.classroom || '-'}</td>
          <td class="px-4 py-3 font-bold text-gray-900">${formatCurrency(s.total_amount)}</td>
          <td class="px-4 py-3 text-sm text-gray-600">${s.installments}</td>
          <td class="px-4 py-3 text-xs text-gray-500">${(s.items || []).map(i => i.category + ': ' + formatCurrency(i.amount)).join(', ')}</td>
        `);
        document.getElementById('structTable').innerHTML = buildTable(hdrs, rows, 'No fee structures');
      } catch (e) {}
    }

    async function loadDues() {
      if (!schoolId) { document.getElementById('duesTable').innerHTML = '<p class="text-gray-400 text-sm p-4">Configure school first</p>'; return; }
      try {
        const r = await FeesAPI.getDues(schoolId); const d = r?.data || {};
        document.getElementById('duesTable').innerHTML = `
          <div class="grid grid-cols-3 gap-4 mb-5">
            <div class="bg-red-50 rounded-xl p-4 text-center"><div class="text-2xl font-bold text-red-600">${d.total_pending_invoices || 0}</div><div class="text-xs text-red-500 mt-0.5">Pending Invoices</div></div>
            <div class="bg-orange-50 rounded-xl p-4 text-center"><div class="text-2xl font-bold text-orange-600">${formatCurrency(d.total_due_amount || 0)}</div><div class="text-xs text-orange-500 mt-0.5">Total Due Amount</div></div>
            <div class="bg-yellow-50 rounded-xl p-4 text-center"><div class="text-2xl font-bold text-yellow-600">${(d.invoices || []).filter(i => i.status === 'Overdue').length}</div><div class="text-xs text-yellow-600 mt-0.5">Overdue Invoices</div></div>
          </div>` + buildTable(
          ['Invoice No', 'Student', 'Net Amount', 'Paid', 'Balance', 'Due Date', 'Status'],
          (d.invoices || []).map(inv => `
            <td class="px-4 py-3 font-mono text-xs text-gray-500">${inv.invoice_no}</td>
            <td class="px-4 py-3 font-medium text-gray-900 text-sm">${inv.student_name || '-'}</td>
            <td class="px-4 py-3 text-sm font-medium">${formatCurrency(inv.net_amount)}</td>
            <td class="px-4 py-3 text-sm text-emerald-600">${formatCurrency(inv.paid_amount)}</td>
            <td class="px-4 py-3 text-sm text-red-500 font-bold">${formatCurrency(inv.balance)}</td>
            <td class="px-4 py-3 text-sm text-gray-600">${formatDate(inv.due_date)}</td>
            <td class="px-4 py-3">${tdBadge(inv.status, inv.status === 'Overdue' ? 'red' : 'orange')}</td>
          `), 'No dues found');
      } catch (e) { document.getElementById('duesTable').innerHTML = `<div class="text-center py-8 text-red-400">Error: ${e.message}</div>`; }
    }

    document.getElementById('invStatus').addEventListener('change', loadInvoices);
    loadFeeStats(); loadInvoices();
  </script>
</body>
</html>
