<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/png" href="/public/circlelogo.png" />
  <script src="https://unpkg.com/lucide@latest"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box}
body{font-family:"DM Sans",sans-serif;background:#f0f2f8;color:#1e293b}
h1,h2,h3,h4,.font-outfit{font-family:"Outfit",sans-serif}
.finput{width:100%;padding:.625rem .875rem;border-radius:.75rem;border:1.5px solid #e2e8f0;background:#f0f2f8;font-size:.875rem;outline:none;transition:all .15s;color:#1e293b}
.finput:focus{background:#fff;border-color:#6366f1;box-shadow:0 0 0 3px rgba(99,102,241,.12)}
.lbl{display:block;font-size:.8125rem;font-weight:600;color:#475569;margin-bottom:.375rem}
.modal-overlay{position:fixed;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;padding:1rem;background:rgba(15,23,42,.55);backdrop-filter:blur(4px)}
.modal-box{background:#fff;border-radius:1.5rem;box-shadow:0 25px 50px rgba(0,0,0,.22);width:100%;overflow:hidden;animation:modalIn .2s ease}
@keyframes modalIn{from{opacity:0;transform:scale(.96) translateY(6px)}to{opacity:1;transform:scale(1) translateY(0)}}
.tab-bar{display:flex;border-bottom:2px solid #f1f5f9;overflow-x:auto;gap:.25rem;padding:0 1rem}
.tab-bar::-webkit-scrollbar{display:none}
.tab-btn{padding:.875rem 1.125rem;font-size:.8125rem;font-weight:600;background:none;border:none;cursor:pointer;white-space:nowrap;color:#94a3b8;border-bottom:2.5px solid transparent;margin-bottom:-2px;transition:all .15s;font-family:"DM Sans",sans-serif}
.tab-btn.active{color:#6366f1;border-bottom-color:#6366f1}
.tab-btn:not(.active):hover{color:#475569}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:999px}
.finput:focus{background:#fff;border-color:#3b82f6}
.lbl{display:block;font-size:.875rem;font-weight:500;color:#374151;margin-bottom:.375rem}
</style>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Transport - Scholar Desk</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body>
  <!-- ✅ Same layout pattern as students.html -->
  <div class="min-h-screen">
    <div id="sidebarContainer"></div>
    <main class="min-h-screen lg:ml-[260px]">
      <div id="topbarContainer"></div>
      <div class="p-6 space-y-6">

        <div style="background:#fff;border-radius:1.25rem;padding:1rem 1.25rem;border:1.5px solid #f1f5f9;display:flex;justify-content:space-between;align-items:center;gap:1rem;flex-wrap:wrap">
          <div>
            <p class="text-xs font-bold uppercase tracking-[0.18em] text-slate-400">Branch Filter</p>
            <p id="transportBranchLabel" class="text-sm font-semibold text-slate-900 mt-1">All branches in logged-in school</p>
          </div>
          <div class="min-w-[240px]">
            <select id="transportBranchFilter" class="finput">
              <option value="">All Branches</option>
            </select>
          </div>
        </div>

        <div id="transportStats" class="grid grid-cols-2 sm:grid-cols-4 gap-4"></div>

        <div style="background:#fff;border-radius:1.25rem;border:1.5px solid #f1f5f9;box-shadow:0 1px 3px rgba(0,0,0,.04)">
          <div class="tab-bar">
            <button onclick="switchTab(0)" class="ttab px-5 py-4 text-sm font-semibold border-b-2 border-blue-600 text-blue-600 whitespace-nowrap">Routes</button>
            <button onclick="switchTab(1)" class="ttab px-5 py-4 text-sm font-semibold border-b-2 border-transparent text-gray-500 hover:text-gray-700 whitespace-nowrap">Vehicles</button>
            <button onclick="switchTab(2)" class="ttab px-5 py-4 text-sm font-semibold border-b-2 border-transparent text-gray-500 hover:text-gray-700 whitespace-nowrap">Drivers</button>
            <button onclick="switchTab(3)" class="ttab px-5 py-4 text-sm font-semibold border-b-2 border-transparent text-gray-500 hover:text-gray-700 whitespace-nowrap">Student Routes</button>
            <button onclick="switchTab(4)" class="ttab px-5 py-4 text-sm font-semibold border-b-2 border-transparent text-gray-500 hover:text-gray-700 whitespace-nowrap">Maintenance</button>
          </div>

          <!-- Routes -->
          <div id="ttab0" class="p-5">
            <div class="flex justify-between mb-4"><h4 class="font-bold text-gray-900">Transport Routes</h4>
              <button onclick="document.getElementById('routeModal').style.display='flex'" class="px-4 py-2 bg-blue-600 text-white rounded-xl text-sm font-medium hover:bg-blue-700">+ Add Route</button></div>
            <div id="routeTable"></div>
          </div>

          <!-- Vehicles -->
          <div id="ttab1" class="p-5 hidden">
            <div class="flex justify-between mb-4"><h4 class="font-bold text-gray-900">Vehicles</h4>
              <button onclick="document.getElementById('vehicleModal').style.display='flex';loadRouteOptions()" class="px-4 py-2 bg-blue-600 text-white rounded-xl text-sm font-medium hover:bg-blue-700">+ Add Vehicle</button></div>
            <div id="vehicleTable"></div>
          </div>

          <!-- Drivers -->
          <div id="ttab2" class="p-5 hidden">
            <div class="flex justify-between mb-4"><h4 class="font-bold text-gray-900">Drivers</h4>
              <button onclick="document.getElementById('driverModal').style.display='flex'" class="px-4 py-2 bg-blue-600 text-white rounded-xl text-sm font-medium hover:bg-blue-700">+ Add Driver</button></div>
            <div id="driverTable"></div>
          </div>

          <!-- Student Mapping -->
          <div id="ttab3" class="p-5 hidden">
            <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3 mb-4"><h4 class="font-bold text-gray-900">Student Transport Assignment</h4>
              <div class="text-xs text-blue-600 bg-blue-50 px-3 py-2 rounded-xl">Student route mapping now happens inside the Add Student form.</div></div>
            <div id="stTable"></div>
          </div>

          <!-- Maintenance -->
          <div id="ttab4" class="p-5 hidden">
            <div class="flex justify-between mb-4"><h4 class="font-bold text-gray-900">Vehicle Maintenance</h4>
              <button onclick="document.getElementById('maintModal').style.display='flex';loadMaintVehicles()" class="px-4 py-2 bg-blue-600 text-white rounded-xl text-sm font-medium hover:bg-blue-700">+ Add Record</button></div>
            <div id="maintVehicleSelect" class="mb-4">
              <select id="maintFilter" class="px-3 py-2.5 rounded-xl border border-gray-200 bg-gray-50 text-sm" onchange="loadMaintRecords(this.value)">
                <option value="">Select vehicle to view records</option>
              </select>
            </div>
            <div id="maintTable"></div>
          </div>
        </div>

      </div>
    </main>
  </div>

  <!-- Route Modal -->
  <div id="routeModal" class="modal-overlay" style="display:none">
    <div class="modal-box w-full max-w-lg max-h-[90vh] overflow-y-auto">
      <div class="flex justify-between items-center px-6 py-4 border-b"><h3 class="font-bold text-gray-900">Add Route</h3><button onclick="document.getElementById('routeModal').style.display='none'" class="text-gray-400 hover:text-gray-600 text-xl px-2">×</button></div>
      <div class="px-6 py-5 space-y-4">
        <div class="grid grid-cols-2 gap-4">
          <div><label class="lbl">Route Name *</label><input id="rt_name" class="finput" placeholder="e.g. Route 1 - North"/></div>
          <div><label class="lbl">Route Code *</label><input id="rt_code" class="finput" placeholder="e.g. RT001"/></div>
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div><label class="lbl">Start Point *</label><input id="rt_start" class="finput" placeholder="Start location"/></div>
          <div><label class="lbl">End Point *</label><input id="rt_end" class="finput" placeholder="End location"/></div>
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div><label class="lbl">Distance (km)</label><input id="rt_dist" type="number" class="finput" placeholder="0"/></div>
          <div><label class="lbl">Duration (min)</label><input id="rt_dur" type="number" class="finput" placeholder="0"/></div>
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div><label class="lbl">Morning Departure</label><input id="rt_morn" type="time" class="finput"/></div>
          <div><label class="lbl">Afternoon Departure</label><input id="rt_aft" type="time" class="finput"/></div>
        </div>
        <div><label class="lbl">Monthly Fee (₹)</label><input id="rt_fee" type="number" class="finput" placeholder="0"/></div>
        <div>
          <label class="lbl">Stops (one per line: Name, Time)</label>
          <textarea id="rt_stops" rows="4" class="finput resize-none" placeholder="Bus Stand, 07:10&#10;City Mall, 07:20&#10;College Road, 07:30"></textarea>
        </div>
      </div>
      <div class="flex gap-3 px-6 py-4 border-t justify-end">
        <button onclick="document.getElementById('routeModal').style.display='none'" class="px-5 py-2.5 bg-gray-100 text-gray-700 rounded-xl text-sm">Cancel</button>
        <button onclick="saveRoute()" class="px-5 py-2.5 bg-blue-600 text-white rounded-xl text-sm font-medium">Save</button>
      </div>
    </div>
  </div>

  <!-- Vehicle Modal -->
  <div id="vehicleModal" class="modal-overlay" style="display:none">
    <div class="modal-box w-full max-w-lg max-h-[90vh] overflow-y-auto">
      <div class="flex justify-between items-center px-6 py-4 border-b"><h3 class="font-bold text-gray-900">Add Vehicle</h3><button onclick="document.getElementById('vehicleModal').style.display='none'" class="text-gray-400 hover:text-gray-600 text-xl px-2">×</button></div>
      <div class="px-6 py-5 space-y-4">
        <div class="grid grid-cols-2 gap-4">
          <div><label class="lbl">Vehicle Number *</label><input id="vh_no" class="finput" placeholder="e.g. DL01AB1234"/></div>
          <div><label class="lbl">Type</label><select id="vh_type" class="finput"><option value="Bus">Bus</option><option value="Van">Van</option><option value="Mini-Bus">Mini-Bus</option><option value="Auto">Auto</option></select></div>
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div><label class="lbl">Make/Model</label><input id="vh_model" class="finput" placeholder="e.g. Tata LP 407"/></div>
          <div><label class="lbl">Capacity</label><input id="vh_cap" type="number" class="finput" placeholder="40"/></div>
        </div>
        <div><label class="lbl">Assigned Route</label><select id="vh_route" class="finput"><option value="">Select route</option></select></div>
        <div><label class="lbl">Driver Name</label><input id="vh_driver" class="finput" placeholder="Driver name"/></div>
        <div class="grid grid-cols-2 gap-4">
          <div><label class="lbl">Fitness Expiry</label><input id="vh_fit" type="date" class="finput"/></div>
          <div><label class="lbl">Insurance Expiry</label><input id="vh_ins" type="date" class="finput"/></div>
        </div>
        <div><label class="lbl">Permit Expiry</label><input id="vh_per" type="date" class="finput"/></div>
      </div>
      <div class="flex gap-3 px-6 py-4 border-t justify-end">
        <button onclick="document.getElementById('vehicleModal').style.display='none'" class="px-5 py-2.5 bg-gray-100 text-gray-700 rounded-xl text-sm">Cancel</button>
        <button onclick="saveVehicle()" class="px-5 py-2.5 bg-blue-600 text-white rounded-xl text-sm font-medium">Save</button>
      </div>
    </div>
  </div>

  <!-- Driver Modal -->
  <div id="driverModal" class="modal-overlay" style="display:none">
    <div class="modal-box w-full max-w-md">
      <div class="flex justify-between items-center px-6 py-4 border-b"><h3 class="font-bold text-gray-900">Add Driver</h3><button onclick="document.getElementById('driverModal').style.display='none'" class="text-gray-400 hover:text-gray-600 text-xl px-2">×</button></div>
      <div class="px-6 py-5 space-y-4">
        <div><label class="lbl">Name *</label><input id="dr_name" class="finput" placeholder="Full name"/></div>
        <div class="grid grid-cols-2 gap-4">
          <div><label class="lbl">Phone *</label><input id="dr_ph" type="tel" class="finput" placeholder="Phone"/></div>
          <div><label class="lbl">Experience (Years)</label><input id="dr_exp" type="number" class="finput" placeholder="0"/></div>
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div><label class="lbl">License No *</label><input id="dr_lic" class="finput" placeholder="License number"/></div>
          <div><label class="lbl">License Expiry</label><input id="dr_licexp" type="date" class="finput"/></div>
        </div>
        <div><label class="lbl">Aadhar Number</label><input id="dr_aad" class="finput" placeholder="12-digit" maxlength="12"/></div>
        <div><label class="lbl">Address</label><textarea id="dr_addr" rows="2" class="finput resize-none" placeholder="Address"></textarea></div>
      </div>
      <div class="flex gap-3 px-6 py-4 border-t justify-end">
        <button onclick="document.getElementById('driverModal').style.display='none'" class="px-5 py-2.5 bg-gray-100 text-gray-700 rounded-xl text-sm">Cancel</button>
        <button onclick="saveDriver()" class="px-5 py-2.5 bg-blue-600 text-white rounded-xl text-sm font-medium">Save</button>
      </div>
    </div>
  </div>

  <!-- Student Transport Modal -->
  <div id="stModal" class="modal-overlay" style="display:none">
    <div class="modal-box w-full max-w-md">
      <div class="flex justify-between items-center px-6 py-4 border-b"><h3 class="font-bold text-gray-900">Assign Student to Route</h3><button onclick="document.getElementById('stModal').style.display='none'" class="text-gray-400 hover:text-gray-600 text-xl px-2">×</button></div>
      <div class="px-6 py-5 space-y-4">
        <div><label class="lbl">Student *</label><select id="st_student" class="finput"><option value="">Select student</option></select></div>
        <div><label class="lbl">Route *</label><select id="st_route" class="finput" onchange="updateStopOptions()"><option value="">Select route</option></select></div>
        <div class="grid grid-cols-2 gap-4">
          <div><label class="lbl">Pickup Stop</label><input id="st_pickup" class="finput" placeholder="Pickup stop"/></div>
          <div><label class="lbl">Drop Stop</label><input id="st_drop" class="finput" placeholder="Drop stop"/></div>
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div><label class="lbl">Pickup Time</label><input id="st_ptime" type="time" class="finput"/></div>
          <div><label class="lbl">Drop Time</label><input id="st_dtime" type="time" class="finput"/></div>
        </div>
      </div>
      <div class="flex gap-3 px-6 py-4 border-t justify-end">
        <button onclick="document.getElementById('stModal').style.display='none'" class="px-5 py-2.5 bg-gray-100 text-gray-700 rounded-xl text-sm">Cancel</button>
        <button onclick="saveStudentTransport()" class="px-5 py-2.5 bg-blue-600 text-white rounded-xl text-sm font-medium">Assign</button>
      </div>
    </div>
  </div>

  <!-- Maintenance Modal -->
  <div id="maintModal" class="modal-overlay" style="display:none">
    <div class="modal-box w-full max-w-md">
      <div class="flex justify-between items-center px-6 py-4 border-b"><h3 class="font-bold text-gray-900">Maintenance Record</h3><button onclick="document.getElementById('maintModal').style.display='none'" class="text-gray-400 hover:text-gray-600 text-xl px-2">×</button></div>
      <div class="px-6 py-5 space-y-4">
        <div><label class="lbl">Vehicle *</label><select id="mt_vehicle" class="finput"><option value="">Select vehicle</option></select></div>
        <div><label class="lbl">Type *</label><select id="mt_type" class="finput"><option value="Routine Service">Routine Service</option><option value="Repair">Repair</option><option value="Tyre Change">Tyre Change</option><option value="Oil Change">Oil Change</option><option value="Brake Service">Brake Service</option><option value="Other">Other</option></select></div>
        <div><label class="lbl">Description</label><textarea id="mt_desc" rows="2" class="finput resize-none" placeholder="Details"></textarea></div>
        <div class="grid grid-cols-2 gap-4">
          <div><label class="lbl">Cost (₹)</label><input id="mt_cost" type="number" class="finput" placeholder="0"/></div>
          <div><label class="lbl">Vendor</label><input id="mt_vendor" class="finput" placeholder="Vendor/Garage"/></div>
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div><label class="lbl">Date</label><input id="mt_date" type="date" class="finput"/></div>
          <div><label class="lbl">Next Due</label><input id="mt_next" type="date" class="finput"/></div>
        </div>
        <label class="flex items-center gap-2"><input type="checkbox" id="mt_done" class="w-4 h-4 accent-blue-600"/><span class="text-sm text-gray-700">Mark as Completed</span></label>
      </div>
      <div class="flex gap-3 px-6 py-4 border-t justify-end">
        <button onclick="document.getElementById('maintModal').style.display='none'" class="px-5 py-2.5 bg-gray-100 text-gray-700 rounded-xl text-sm">Cancel</button>
        <button onclick="saveMaintenance()" class="px-5 py-2.5 bg-blue-600 text-white rounded-xl text-sm font-medium">Save</button>
      </div>
    </div>
  </div>

  <div id="toast" class="hidden fixed bottom-6 right-6 z-50 px-6 py-3 rounded-xl text-white font-medium shadow-2xl"></div>

  <script src="js/api.js"></script>
  <script src="js/layout.js"></script>
  <script>
    requireAuth();
    document.getElementById('sidebarContainer').innerHTML = renderSidebar('transport');
    document.getElementById('topbarContainer').innerHTML = renderTopbar('Transport Management', 'Manage routes, vehicles, drivers and student transport pricing');
    let schoolId = localStorage.getItem('school_id');
    let schoolBranches = [];
    let selectedBranchCode = '';

    document.getElementById('transportBranchFilter').addEventListener('change', async (e) => {
      selectedBranchCode = e.target.value || '';
      updateTransportBranchLabel();
      await refreshTransportViews();
    });

    function updateTransportBranchLabel() {
      const selectedBranch = schoolBranches.find(branch => branch.code === selectedBranchCode);
      document.getElementById('transportBranchLabel').textContent = selectedBranch
        ? `${selectedBranch.name} branch`
        : 'All branches in logged-in school';
    }

    async function loadTransportBranches() {
      schoolId = await initializeSchoolContext();
      if (!schoolId) return;
      try {
        const res = await SchoolAPI.get(schoolId);
        schoolBranches = res?.data?.branches || [];
        const filter = document.getElementById('transportBranchFilter');
        const previous = selectedBranchCode;
        filter.innerHTML = '<option value="">All Branches</option>' +
          schoolBranches.map(branch => `<option value="${branch.code}">${branch.name}${branch.code ? ` (${branch.code})` : ''}</option>`).join('');
        if (previous && schoolBranches.some(branch => branch.code === previous)) {
          filter.value = previous;
          selectedBranchCode = previous;
        } else {
          filter.value = '';
          selectedBranchCode = '';
        }
        selectedBranchCode = applyBranchAccessToSelect('transportBranchFilter', selectedBranchCode);
      } catch (e) {
        schoolBranches = [];
        document.getElementById('transportBranchFilter').innerHTML = '<option value="">All Branches</option>';
        selectedBranchCode = getScopedBranchCode('');
      }
      updateTransportBranchLabel();
    }

    async function refreshTransportViews() {
      await Promise.allSettled([loadStats(), loadRoutes()]);
      if (!document.getElementById('ttab3').classList.contains('hidden')) await loadStudentTransport();
    }

    function switchTab(idx) {
      document.querySelectorAll('.ttab').forEach((b, i) => { b.classList.toggle('border-blue-600', i === idx); b.classList.toggle('text-blue-600', i === idx); b.classList.toggle('border-transparent', i !== idx); b.classList.toggle('text-gray-500', i !== idx); });
      document.querySelectorAll('[id^="ttab"]').forEach(t => { t.classList.toggle('hidden', parseInt(t.id.replace('ttab', '')) !== idx); });
      if (idx === 0) loadRoutes();
      if (idx === 1) { loadVehicles(); loadRouteOptions(); }
      if (idx === 2) loadDrivers();
      if (idx === 3) { loadStudentTransport(); }
      if (idx === 4) loadMaintVehicles();
    }

   async function loadStats() {
  if (!schoolId) return;

  try {
    const r = await TransportAPI.getStats(schoolId, selectedBranchCode);
    const d = r?.data || {};

    document.getElementById('transportStats').innerHTML =
      statCard('Total Routes', d.total_routes || 0, 'map', 'blue') +
      statCard('Total Vehicles', d.total_vehicles || 0, 'truck', 'green') +
      statCard('Active Vehicles', d.active_vehicles || 0, 'check-circle', 'emerald') +
      statCard('Students', d.students_using_transport || 0, 'users', 'orange');

    // 🔥 IMPORTANT
    lucide.createIcons();

  } catch (e) {}
}

    async function loadRoutes() {
      if (!schoolId) { document.getElementById('routeTable').innerHTML = '<p class="text-gray-400 text-sm p-4">Configure school first</p>'; return; }
      try {
        const r = await TransportAPI.getRoutes(schoolId, selectedBranchCode); const routes = r?.data || [];
        const hdrs = ['Route Name', 'Code', 'Start', 'End', 'Distance', 'Morning', 'Afternoon', 'Monthly Fee', 'Students', ''];
        const rows = routes.map(rt => `
          <td class="px-4 py-3 font-medium text-gray-900 text-sm">${rt.route_name}</td>
          <td class="px-4 py-3 font-mono text-xs text-gray-500">${rt.route_code}</td>
          <td class="px-4 py-3 text-sm text-gray-600">${rt.start_point}</td>
          <td class="px-4 py-3 text-sm text-gray-600">${rt.end_point}</td>
          <td class="px-4 py-3 text-sm text-gray-600">${rt.distance_km || 0} km</td>
          <td class="px-4 py-3 text-sm text-gray-600">${rt.morning_departure || '-'}</td>
          <td class="px-4 py-3 text-sm text-gray-600">${rt.afternoon_departure || '-'}</td>
          <td class="px-4 py-3 font-medium text-gray-900">${formatCurrency(rt.fee_per_month)}</td>
          <td class="px-4 py-3 text-center"><span class="px-2 py-1 bg-blue-100 text-blue-700 rounded-lg text-xs font-semibold">${rt.student_count || 0}</span></td>
          <td class="px-4 py-3"><button onclick="deleteRoute('${rt.id}')" class="text-xs text-red-500 hover:underline">Delete</button></td>
        `);
        document.getElementById('routeTable').innerHTML = buildTable(hdrs, rows, 'No routes added yet');
      } catch (e) { document.getElementById('routeTable').innerHTML = `<p class="text-red-400 text-sm p-4">Error: ${e.message}</p>`; }
    }

    async function saveRoute() {
      if (!schoolId) { showToast('Configure school first', 'error'); return; }
      const name = document.getElementById('rt_name').value.trim(), code = document.getElementById('rt_code').value.trim();
      const start = document.getElementById('rt_start').value.trim(), end = document.getElementById('rt_end').value.trim();
      if (!name || !code || !start || !end) { showToast('Fill required fields', 'error'); return; }
      const stopsRaw = document.getElementById('rt_stops').value.trim();
      const stops = stopsRaw ? stopsRaw.split('\n').map((s, i) => { const p = s.split(','); return { name: p[0]?.trim(), time: p[1]?.trim(), order: i + 1 }; }) : [];
      try {
        await TransportAPI.createRoute({ school_id: schoolId, route_name: name, route_code: code, start_point: start, end_point: end, stops, distance_km: parseFloat(document.getElementById('rt_dist').value) || 0, estimated_duration_min: parseInt(document.getElementById('rt_dur').value) || 0, morning_departure: document.getElementById('rt_morn').value || null, afternoon_departure: document.getElementById('rt_aft').value || null, fee_per_month: parseFloat(document.getElementById('rt_fee').value) || 0 });
        showToast('Route saved!'); document.getElementById('routeModal').style.display = 'none'; loadRoutes(); loadStats();
      } catch (e) { showToast('Error: ' + e.message, 'error'); }
    }

    async function deleteRoute(id) {
      if (!confirm('Delete this route?')) return;
      try { await TransportAPI.deleteRoute(id); showToast('Route deleted'); loadRoutes(); loadStats(); }
      catch (e) { showToast('Error: ' + e.message, 'error'); }
    }

    async function loadRouteOptions() {
      if (!schoolId) return;
      try {
        const r = await TransportAPI.getRoutes(schoolId, selectedBranchCode);
        const opts = '<option value="">Select route</option>' + (r?.data || []).map(rt => `<option value="${rt.id}">${rt.route_name}</option>`).join('');
        ['vh_route', 'st_route'].forEach(id => { const el = document.getElementById(id); if (el) el.innerHTML = opts; });
      } catch (e) {}
    }

    async function loadVehicles() {
      if (!schoolId) return;
      try {
        const r = await TransportAPI.getVehicles(schoolId); const vehs = r?.data || [];
        const vehOpts = '<option value="">Select vehicle</option>' + vehs.map(v => `<option value="${v.id}">${v.vehicle_no} - ${v.vehicle_type}</option>`).join('');
        document.getElementById('maintFilter').innerHTML = vehOpts;
        document.getElementById('mt_vehicle').innerHTML = vehOpts;
        const hdrs = ['Vehicle No', 'Type', 'Model', 'Capacity', 'Route', 'Driver', 'Status', 'Fitness', 'Insurance'];
        const rows = vehs.map(v => `
          <td class="px-4 py-3 font-medium text-gray-900 text-sm">${v.vehicle_no}</td>
          <td class="px-4 py-3">${tdBadge(v.vehicle_type, 'blue')}</td>
          <td class="px-4 py-3 text-sm text-gray-600">${v.make_model || '-'}</td>
          <td class="px-4 py-3 text-sm text-center text-gray-600">${v.capacity}</td>
          <td class="px-4 py-3 text-sm text-gray-600">${v.route_name || '-'}</td>
          <td class="px-4 py-3 text-sm text-gray-600">${v.driver || '-'}</td>
          <td class="px-4 py-3">${tdBadge(v.status, v.status === 'Active' ? 'green' : v.status === 'In-Maintenance' ? 'orange' : 'gray')}</td>
          <td class="px-4 py-3 text-xs text-gray-500">${v.fitness_expiry ? formatDate(v.fitness_expiry) : '-'}</td>
          <td class="px-4 py-3 text-xs text-gray-500">${v.insurance_expiry ? formatDate(v.insurance_expiry) : '-'}</td>
        `);
        document.getElementById('vehicleTable').innerHTML = buildTable(hdrs, rows, 'No vehicles added yet');
      } catch (e) {}
    }

    async function saveVehicle() {
      if (!schoolId) { showToast('Configure school first', 'error'); return; }
      const no = document.getElementById('vh_no').value.trim();
      if (!no) { showToast('Vehicle number required', 'error'); return; }
      try {
        await TransportAPI.createVehicle({ school_id: schoolId, vehicle_no: no, vehicle_type: document.getElementById('vh_type').value, make_model: document.getElementById('vh_model').value || null, capacity: parseInt(document.getElementById('vh_cap').value) || 40, route_id: document.getElementById('vh_route').value || null, driver: document.getElementById('vh_driver').value || null, fitness_expiry: document.getElementById('vh_fit').value || null, insurance_expiry: document.getElementById('vh_ins').value || null, permit_expiry: document.getElementById('vh_per').value || null });
        showToast('Vehicle added!'); document.getElementById('vehicleModal').style.display = 'none'; loadVehicles(); loadStats();
      } catch (e) { showToast('Error: ' + e.message, 'error'); }
    }

    async function loadDrivers() {
      if (!schoolId) return;
      try {
        const r = await TransportAPI.getDrivers(schoolId); const drvs = r?.data || [];
        const hdrs = ['Name', 'Phone', 'License No', 'Expiry', 'Experience', 'Assigned Vehicle'];
        const rows = drvs.map(d => `
          <td class="px-4 py-3 font-medium text-gray-900 text-sm">${d.name}</td>
          <td class="px-4 py-3 text-sm text-gray-600">${d.phone}</td>
          <td class="px-4 py-3 font-mono text-xs text-gray-500">${d.license_no}</td>
          <td class="px-4 py-3 text-sm text-gray-500">${d.license_expiry ? formatDate(d.license_expiry) : '-'}</td>
          <td class="px-4 py-3 text-sm text-gray-600">${d.experience_years} yrs</td>
          <td class="px-4 py-3 text-sm text-gray-600">${d.assigned_vehicle || '-'}</td>
        `);
        document.getElementById('driverTable').innerHTML = buildTable(hdrs, rows, 'No drivers added yet');
      } catch (e) {}
    }

    async function saveDriver() {
      if (!schoolId) { showToast('Configure school first', 'error'); return; }
      const name = document.getElementById('dr_name').value.trim(), ph = document.getElementById('dr_ph').value.trim(), lic = document.getElementById('dr_lic').value.trim();
      if (!name || !ph || !lic) { showToast('Name, phone, license required', 'error'); return; }
      try {
        await TransportAPI.createDriver({ school_id: schoolId, name, phone: ph, license_no: lic, license_expiry: document.getElementById('dr_licexp').value || null, aadhar_number: document.getElementById('dr_aad').value || null, address: document.getElementById('dr_addr').value || null, experience_years: parseInt(document.getElementById('dr_exp').value) || 0 });
        showToast('Driver added!'); document.getElementById('driverModal').style.display = 'none'; loadDrivers();
      } catch (e) { showToast('Error: ' + e.message, 'error'); }
    }

    async function loadStAssignForm() {
      if (!schoolId) return;
      try {
        const [sr, rr] = await Promise.allSettled([StudentAPI.list({ school_id: schoolId, branch_code: selectedBranchCode, per_page: 200, admission_status: 'Active' }), TransportAPI.getRoutes(schoolId, selectedBranchCode)]);
        if (sr.status === 'fulfilled') document.getElementById('st_student').innerHTML = '<option value="">Select student</option>' + (sr.value?.data || []).map(s => `<option value="${s.id}">${s.full_name} (${s.admission_no})</option>`).join('');
        if (rr.status === 'fulfilled') document.getElementById('st_route').innerHTML = '<option value="">Select route</option>' + (rr.value?.data || []).map(r => `<option value="${r.id}">${r.route_name}</option>`).join('');
      } catch (e) {}
    }

    async function loadStudentTransport() {
      if (!schoolId) return;
      try {
        const r = await TransportAPI.getStudentTransport(schoolId, null, selectedBranchCode); const data = r?.data || [];
        const hdrs = ['Student', 'Admission No', 'Route', 'Pickup Stop', 'Drop Stop', 'Pickup Time', 'Monthly Fee'];
        const rows = data.map(st => `
          <td class="px-4 py-3 font-medium text-gray-900 text-sm">${st.student_name || '-'}</td>
          <td class="px-4 py-3 font-mono text-xs text-gray-500">${st.admission_no || '-'}</td>
          <td class="px-4 py-3 text-sm text-gray-600">${st.route_name || '-'}</td>
          <td class="px-4 py-3 text-sm text-gray-600">${st.pickup_stop || '-'}</td>
          <td class="px-4 py-3 text-sm text-gray-600">${st.drop_stop || '-'}</td>
          <td class="px-4 py-3 text-sm text-gray-600">${st.pickup_time || '-'}</td>
          <td class="px-4 py-3 font-medium text-gray-900 text-sm">${formatCurrency(st.fee_per_month)}</td>
        `);
        document.getElementById('stTable').innerHTML = buildTable(hdrs, rows, 'No students assigned to transport');
      } catch (e) {}
    }

    async function saveStudentTransport() {
      if (!schoolId) { showToast('Configure school first', 'error'); return; }
      const stId = document.getElementById('st_student').value, rtId = document.getElementById('st_route').value;
      if (!stId || !rtId) { showToast('Select student and route', 'error'); return; }
      try {
        await TransportAPI.assignStudent({ school_id: schoolId, student_id: stId, route_id: rtId, pickup_stop: document.getElementById('st_pickup').value || null, drop_stop: document.getElementById('st_drop').value || null, pickup_time: document.getElementById('st_ptime').value || null, drop_time: document.getElementById('st_dtime').value || null });
        showToast('Student assigned to transport!'); document.getElementById('stModal').style.display = 'none'; loadStudentTransport(); loadStats();
      } catch (e) { showToast('Error: ' + e.message, 'error'); }
    }

    async function loadMaintVehicles() {
      if (!schoolId) return;
      try {
        const r = await TransportAPI.getVehicles(schoolId);
        const opts = '<option value="">Select vehicle</option>' + (r?.data || []).map(v => `<option value="${v.id}">${v.vehicle_no}</option>`).join('');
        document.getElementById('maintFilter').innerHTML = opts;
        document.getElementById('mt_vehicle').innerHTML = opts;
      } catch (e) {}
    }

    async function loadMaintRecords(vehicleId) {
      if (!vehicleId) { document.getElementById('maintTable').innerHTML = ''; return; }
      try {
        const r = await TransportAPI.getMaintenance(vehicleId); const data = r?.data || [];
        const hdrs = ['Type', 'Description', 'Cost', 'Vendor', 'Date', 'Next Due', 'Status'];
        const rows = data.map(m => `
          <td class="px-4 py-3 text-sm font-medium text-gray-900">${m.maintenance_type}</td>
          <td class="px-4 py-3 text-sm text-gray-600">${m.description || '-'}</td>
          <td class="px-4 py-3 font-medium text-gray-900">${formatCurrency(m.cost)}</td>
          <td class="px-4 py-3 text-sm text-gray-600">${m.vendor || '-'}</td>
          <td class="px-4 py-3 text-sm text-gray-500">${formatDate(m.maintenance_date)}</td>
          <td class="px-4 py-3 text-sm text-gray-500">${m.next_due_date ? formatDate(m.next_due_date) : '-'}</td>
          <td class="px-4 py-3">${tdBadge(m.is_completed ? 'Completed' : 'Pending', m.is_completed ? 'green' : 'orange')}</td>
        `);
        document.getElementById('maintTable').innerHTML = buildTable(hdrs, rows, 'No maintenance records');
      } catch (e) {}
    }

    async function saveMaintenance() {
      if (!schoolId) { showToast('Configure school first', 'error'); return; }
      const vId = document.getElementById('mt_vehicle').value;
      if (!vId) { showToast('Select vehicle', 'error'); return; }
      try {
        await TransportAPI.addMaintenance({ school_id: schoolId, vehicle_id: vId, maintenance_type: document.getElementById('mt_type').value, description: document.getElementById('mt_desc').value || null, cost: parseFloat(document.getElementById('mt_cost').value) || 0, vendor: document.getElementById('mt_vendor').value || null, maintenance_date: document.getElementById('mt_date').value || new Date().toISOString(), next_due_date: document.getElementById('mt_next').value || null, is_completed: document.getElementById('mt_done').checked });
        showToast('Maintenance record saved!'); document.getElementById('maintModal').style.display = 'none'; loadMaintRecords(vId);
      } catch (e) { showToast('Error: ' + e.message, 'error'); }
    }

    function statCard(title, value, icon, color) {
  return `
    <div class="bg-white p-4 rounded-2xl border border-gray-100 flex items-center justify-between">
      
      <div>
        <p class="text-sm text-gray-400">${title}</p>
        <h3 class="text-xl font-bold text-gray-900">${value}</h3>
      </div>

      <div class="p-3 rounded-xl bg-${color}-100 text-${color}-600">
        <i data-lucide="${icon}" class="w-5 h-5"></i>
      </div>

    </div>
  `;
}

    (async () => {
      await loadTransportBranches();
      await refreshTransportViews();
    })();
  </script>
</body>
</html>
