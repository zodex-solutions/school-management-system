<!DOCTYPE html>
<html lang="en">

<head>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap"
    rel="stylesheet">
  <style>
    * {
      box-sizing: border-box
    }

    body {
      font-family: "DM Sans", sans-serif;
      background: #f0f2f8;
      color: #1e293b
    }

    h1,
    h2,
    h3,
    h4,
    .font-outfit {
      font-family: "Outfit", sans-serif
    }

    .finput {
      width: 100%;
      padding: .625rem .875rem;
      border-radius: .75rem;
      border: 1.5px solid #e2e8f0;
      background: #f0f2f8;
      font-size: .875rem;
      outline: none;
      transition: all .15s;
      color: #1e293b
    }

    .finput:focus {
      background: #fff;
      border-color: #6366f1;
      box-shadow: 0 0 0 3px rgba(99, 102, 241, .12)
    }

    .lbl {
      display: block;
      font-size: .8125rem;
      font-weight: 600;
      color: #475569;
      margin-bottom: .375rem
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      background: rgba(15, 23, 42, .55);
      backdrop-filter: blur(4px)
    }

    .modal-box {
      background: #fff;
      border-radius: 1.5rem;
      box-shadow: 0 25px 50px rgba(0, 0, 0, .22);
      width: 100%;
      overflow: hidden;
      animation: modalIn .2s ease
    }

    @keyframes modalIn {
      from {
        opacity: 0;
        transform: scale(.96) translateY(6px)
      }

      to {
        opacity: 1;
        transform: scale(1) translateY(0)
      }
    }

    .tab-bar {
      display: flex;
      border-bottom: 2px solid #f1f5f9;
      overflow-x: auto;
      gap: .25rem;
      padding: 0 1rem
    }

    .tab-bar::-webkit-scrollbar {
      display: none
    }

    .tab-btn {
      padding: .875rem 1.125rem;
      font-size: .8125rem;
      font-weight: 600;
      background: none;
      border: none;
      cursor: pointer;
      white-space: nowrap;
      color: #94a3b8;
      border-bottom: 2.5px solid transparent;
      margin-bottom: -2px;
      transition: all .15s;
      font-family: "DM Sans", sans-serif
    }

    .tab-btn.active {
      color: #6366f1;
      border-bottom-color: #6366f1
    }

    .tab-btn:not(.active):hover {
      color: #475569
    }

    ::-webkit-scrollbar {
      width: 5px;
      height: 5px
    }

    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 999px
    }
  </style>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Students - EduManage Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body >
   <div class="min-h-screen">
    <div id="sidebarContainer"></div>
    <main class="min-h-screen lg:ml-[260px]">
      <div id="topbarContainer"></div>
      <div class="p-6 space-y-6">

        <div id="statsRow" class="grid grid-cols-2 sm:grid-cols-4 gap-4"></div>

        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-5">
          <div class="flex flex-col sm:flex-row gap-3 justify-between mb-5">
            <div class="flex gap-2 flex-wrap">
              <input id="searchInput" type="text" placeholder="Search name, admission no..."

              <select id="filterStatus"

                <option value="">All Status</option>

                <option value="Transferred">Transferred</option>
              </select>
              <select id="filterBranch"

                <option value="">All Branches</option>
              </select>
              <select id="filterClass"
                class="px-3 py-2.5 rounded-xl border border-gray-200 bg-gray-50 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
                <option value="">All Classes</option>
              </select>
            </div>
            <button onclick="openAdmModal()"

                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
              </svg>
              Admit Student
            </button>
          </div>
          <div id="tblContainer"></div>
          <div id="pgn" class="flex justify-between items-center mt-4 text-sm text-gray-500"></div>
        </div>

      </div>
    </main>
  </div>

  <!-- Admission Modal -->

      </div>

      display: block;
      font-size: .875rem;
      font-weight: 500;
      color: #374151;

    }

    .finput {
      width: 100%;
      padding: .625rem .75rem;
      border-radius: .75rem;
      border: 1px solid #e5e7eb;
      background: #f9fafb;
      font-size: .875rem;
      outline: none;

  <script src="js/api.js"></script>
  <script src="js/layout.js"></script>
  <script>
    requireAuth();
    document.getElementById('sidebarContainer').innerHTML = renderSidebar('students');
    document.getElementById('topbarContainer').innerHTML = renderTopbar('Student Management', 'Manage admissions and profiles');
    const studentPageParams = new URLSearchParams(window.location.search);
    const ayId = localStorage.getItem('ay_id');
    let currentSchoolId = localStorage.getItem('school_id') || '';
    let curPage = 1, totalPgs = 1;
    let routeCache = [];
    let branchCache = [];
    let selectedBranchCode = studentPageParams.get('branch_code') || '';

    async function loadStats() {
      if (!currentSchoolId) return;
      try {
        const r = await StudentAPI.stats(currentSchoolId, ayId, selectedBranchCode);
        if (r?.data) {
          const d = r.data;
          document.getElementById('statsRow').innerHTML = statCard('Total', d.total || 0, '&#128104;&#8205;&#127979;', 'blue') + statCard('Male', d.by_gender?.male || 0, '&#128104;', 'indigo') + statCard('Female', d.by_gender?.female || 0, '&#128105;', 'purple') + statCard('Transferred', d.by_status?.transferred || 0, '&#128640;', 'orange');
        }
      } catch (e) { }
    }

    async function loadClasses() {
      if (!currentSchoolId) return;
      try {
        const r = await ClassAPI.list(currentSchoolId, ayId); const opts = (r?.data || []).map(c => `<option value="${c.id}" data-fee="${c.class_fee || 0}" data-secs='${JSON.stringify(c.sections)}'>${c.name}</option>`).join('');
        document.getElementById('filterClass').innerHTML = '<option value="">All Classes</option>' + opts;
        document.getElementById('m_cls').innerHTML = '<option value="">Select class</option>' + opts;
      } catch (e) { }
    }

    async function loadSchoolMeta() {
      if (!currentSchoolId) return;
      try {
        const r = await SchoolAPI.get(currentSchoolId);
        branchCache = r?.data?.branches || [];
        const branchOpts = '<option value="">Main School</option>' + branchCache.map(b => `<option value="${b.code}" data-name="${b.name}">${b.name}</option>`).join('');
        document.getElementById('m_branch').innerHTML = branchOpts;
        document.getElementById('filterBranch').innerHTML = '<option value="">All Branches</option>' + branchCache.map(b => `<option value="${b.code}">${b.name}</option>`).join('');
        if (selectedBranchCode) document.getElementById('filterBranch').value = selectedBranchCode;
      } catch (e) { }
    }

    async function loadRoutes() {
      if (!currentSchoolId) return;
      try {
        const r = await TransportAPI.getRoutes(currentSchoolId);
        routeCache = r?.data || [];
        document.getElementById('m_route').innerHTML = '<option value="">Select route</option>' + routeCache.map(rt => `<option value="${rt.id}">${rt.route_name}</option>`).join('');
      } catch (e) { }
    }

    function updateRouteMeta() {
      const route = routeCache.find(r => r.id === document.getElementById('m_route').value);
      document.getElementById('m_charge').value = route ? route.fee_per_month || 0 : '';
      if (route && !document.getElementById('m_bus_stop').value && route.stops?.length) {
        document.getElementById('m_bus_stop').value = route.stops[0].name || '';
      }
      if (route && !document.getElementById('m_transport_area').value) {
        document.getElementById('m_transport_area').value = route.start_point || '';
      }
      updateFeePreview();
    }

    function updateFeePreview() {
      const classEl = document.getElementById('m_cls');
      const selectedClass = classEl.options[classEl.selectedIndex];
      const classFee = parseFloat(selectedClass?.dataset?.fee || '0') || 0;
      const transportFeePerMonth = parseFloat(document.getElementById('m_charge').value || '0') || 0;
      const selectedMonths = document.querySelectorAll('.m_month:checked').length;
      document.getElementById('m_class_fee').value = classFee;
      document.getElementById('m_total_fee').value = classFee + (transportFeePerMonth * selectedMonths);
    }

    function toggleReferralFields() {
      const show = document.getElementById('m_ref_type').value === 'Referral';
      document.getElementById('ref_num_wrap').classList.toggle('hidden', !show);
      document.getElementById('ref_email_wrap').classList.toggle('hidden', !show);
    }

    function collectAddress(prefix) {
      return {
        address: document.getElementById(`${prefix}_address`).value || null,
        village_area: document.getElementById(`${prefix}_village`).value || null,
        post_office: document.getElementById(`${prefix}_post`).value || null,
        city: document.getElementById(`${prefix}_city`).value || null,

                <table class="w-full text-sm"><thead><tr class="text-left text-slate-500 border-b border-slate-200"><th class="py-2 pr-3">Receipt</th><th class="py-2 pr-3">Amount</th><th class="py-2 pr-3">Mode</th><th class="py-2">Date</th></tr></thead><tbody>${paymentRows}</tbody></table>
              </div>
            </div>

            <div class="bg-slate-50 rounded-2xl p-5 border border-slate-200">
              <h5 class="text-base font-bold text-slate-900 mb-4">Address</h5>
              <div class="space-y-4 text-sm">
                <div class="rounded-xl bg-white p-4 border border-slate-200">
                  <div class="font-semibold text-slate-900 mb-2">Present Address</div>
                  <div class="text-slate-600">${[presentAddr.address, presentAddr.village_area, presentAddr.post_office, presentAddr.city, presentAddr.state, presentAddr.pin_code].filter(Boolean).join(', ') || s.current_address || '-'}</div>
                </div>
                <div class="rounded-xl bg-white p-4 border border-slate-200">
                  <div class="font-semibold text-slate-900 mb-2">Permanent Address</div>
                  <div class="text-slate-600">${[permanentAddr.address, permanentAddr.village_area, permanentAddr.post_office, permanentAddr.city, permanentAddr.state, permanentAddr.pin_code].filter(Boolean).join(', ') || s.permanent_address || '-'}</div>
                </div>
              </div>
            </div>

            <div class="bg-slate-50 rounded-2xl p-5 border border-slate-200">
              <h5 class="text-base font-bold text-slate-900 mb-4">Documents</h5>
              <div class="space-y-3">${documents}</div>
            </div>

            <div class="bg-slate-50 rounded-2xl p-5 border border-slate-200">
              <h5 class="text-base font-bold text-slate-900 mb-4">Transfer Certificates</h5>
              <div class="space-y-3">${tcContent}</div>
            </div>
          </div>
        </div>

        <div class="flex gap-3">
          <button onclick="genTC('${id}','${(s.full_name || '').replace(/'/g, "\\'")}')" class="px-4 py-2 bg-orange-100 text-orange-700 rounded-xl text-sm font-medium hover:bg-orange-200">Generate TC</button>
        </div>
      </div>`;
        document.getElementById('detModal').style.display = 'flex';
      } catch (e) { showToast('Error: ' + e.message, 'error'); }
    }

    async function genTC(id, name) {
      if (!confirm('Generate TC for ' + name + '?')) return;
      try { const r = await StudentAPI.generateTC(id, { conduct: 'Good', fee_clearance: false }); showToast('TC ' + r.data.tc_number + ' generated!'); document.getElementById('detModal').style.display = 'none'; loadStudents(curPage); }
      catch (e) { showToast('TC failed: ' + e.message, 'error'); }
    }

    async function delStudent(id, name) {
      if (!confirm('Deactivate "' + name + '"?')) return;
      try { await StudentAPI.delete(id); showToast('Student deactivated'); loadStudents(curPage); loadStats(); }
      catch (e) { showToast('Error: ' + e.message, 'error'); }
    }

    function openAdmModal() {
      document.querySelectorAll('#admModal input,#admModal select,#admModal textarea').forEach(i => { if (i.type === 'checkbox') i.checked = false; else i.value = ''; });
      document.getElementById('m_nat').value = 'Indian';
      toggleReferralFields();
      document.getElementById('admModal').style.display = 'flex';
    }

    async function submitAdm() {
      if (!currentSchoolId) { showToast('Configure school first', 'error'); return; }
      const fn = document.getElementById('m_fn').value.trim(), ln = document.getElementById('m_ln').value.trim();
      const gnd = document.getElementById('m_gnd').value, cls = document.getElementById('m_cls').value, sec = document.getElementById('m_sec').value;
      if (!fn || !ln || !gnd || !cls || !sec) { showToast('Fill all required fields (*)', 'error'); return; }
      try {
        const branchEl = document.getElementById('m_branch');
        const branchOpt = branchEl.options[branchEl.selectedIndex];
        const routeId = document.getElementById('m_route').value || null;
        const months = Array.from(document.querySelectorAll('.m_month:checked')).map(el => el.value);
        const r = await StudentAPI.create({
          first_name: fn, middle_name: document.getElementById('m_mn').value || null, last_name: ln, gender: gnd,
          date_of_birth: document.getElementById('m_dob').value ? new Date(document.getElementById('m_dob').value).toISOString() : null,
          phone: document.getElementById('m_ph').value || null, email: document.getElementById('m_em').value || null,
          religion: document.getElementById('m_rel').value || null,
          caste: document.getElementById('m_caste').value || null,
          nationality: document.getElementById('m_nat').value || 'Indian',
          aadhar_number: document.getElementById('m_aad').value || null,
          school_id: currentSchoolId, academic_year_id: ayId || '',
          classroom_id: cls, section_id: sec,
          branch_code: branchEl.value || null,
          branch_name: branchOpt?.dataset?.name || null,
          admission_type: document.getElementById('m_at').value,
          registration_type: document.getElementById('m_reg_type').value,
          parent_info: {
            father_name: document.getElementById('m_fa').value || null,
            father_phone: document.getElementById('m_fp').value || null,
            father_email: document.getElementById('m_fe').value || null,
            father_occupation: document.getElementById('m_fo').value || null,
            mother_name: document.getElementById('m_ma').value || null,
            mother_phone: document.getElementById('m_mp').value || null,
            guardian_name: document.getElementById('m_guard').value || null,
            guardian_phone: document.getElementById('m_guard_ph').value || null
          },
          medical_info: { blood_group: document.getElementById('m_bg').value || null },
          current_address_details: collectAddress('pres'),
          permanent_address_details: collectAddress('perm'),
          uses_transport: !!routeId,
          transport_route_id: routeId,
          transport_area: document.getElementById('m_transport_area').value || null,
          bus_stop: document.getElementById('m_bus_stop').value || null,
          bus_no: document.getElementById('m_bus_no').value || null,
          transport_months: months,
          migration: document.getElementById('m_migration').checked,
          lateral_entry: document.getElementById('m_lateral').checked,
          referral_type: document.getElementById('m_ref_type').value || null,
          referral_number: document.getElementById('m_ref_num').value || null,
          referral_email: document.getElementById('m_ref_email').value || null,
          remarks: document.getElementById('m_remarks').value || null
        });
        const photo = document.getElementById('m_photo').files[0];
        if (photo) {
          const fd = new FormData();
          fd.append('file', photo);
          await StudentAPI.uploadPhoto(r.data.id, fd);
        }
        showToast('Admitted! No: ' + r.data.admission_no);
        document.getElementById('admModal').style.display = 'none';
        loadStudents(1); loadStats();
      } catch (e) { showToast('Error: ' + e.message, 'error'); }
    }

    const dbLoad = debounce(() => loadStudents(1));
    document.querySelectorAll('.m_month').forEach(el => el.addEventListener('change', updateFeePreview));
    document.getElementById('searchInput').addEventListener('input', dbLoad);
    document.getElementById('filterStatus').addEventListener('change', () => loadStudents(1));
    document.getElementById('filterBranch').addEventListener('change', async (e) => {
      selectedBranchCode = e.target.value || '';
      await loadStats();
      loadStudents(1);
    });
    document.getElementById('filterClass').addEventListener('change', () => loadStudents(1));
    (async function initStudentPage() {
      currentSchoolId = await initializeSchoolContext() || currentSchoolId;
      loadStats(); loadClasses(); loadSchoolMeta(); loadRoutes(); loadStudents();
    })();
  </script>
</body>

</html>
