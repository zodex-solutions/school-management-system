<!DOCTYPE html>
<html lang="en">

<head>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap"
    rel="stylesheet">
  <style>
    * {
      box-sizing: border-box
    }

    body {
      font-family: "DM Sans", sans-serif;
      background: #f0f2f8;
      color: #1e293b
    }

    h1,
    h2,
    h3,
    h4,
    .font-outfit {
      font-family: "Outfit", sans-serif
    }

    .finput {
      width: 100%;
      padding: .625rem .875rem;
      border-radius: .75rem;
      border: 1.5px solid #e2e8f0;
      background: #f0f2f8;
      font-size: .875rem;
      outline: none;
      transition: all .15s;
      color: #1e293b
    }

    .finput:focus {
      background: #fff;
      border-color: #6366f1;
      box-shadow: 0 0 0 3px rgba(99, 102, 241, .12)
    }

    .lbl {
      display: block;
      font-size: .8125rem;
      font-weight: 600;
      color: #475569;
      margin-bottom: .375rem
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      background: rgba(15, 23, 42, .55);
      backdrop-filter: blur(4px)
    }

    .modal-box {
      background: #fff;
      border-radius: 1.5rem;
      box-shadow: 0 25px 50px rgba(0, 0, 0, .22);
      width: 100%;
      overflow: hidden;
      animation: modalIn .2s ease
    }

    @keyframes modalIn {
      from {
        opacity: 0;
        transform: scale(.96) translateY(6px)
      }

      to {
        opacity: 1;
        transform: scale(1) translateY(0)
      }
    }

    .tab-bar {
      display: flex;
      border-bottom: 2px solid #f1f5f9;
      overflow-x: auto;
      gap: .25rem;
      padding: 0 1rem
    }

    .tab-bar::-webkit-scrollbar {
      display: none
    }

    .tab-btn {
      padding: .875rem 1.125rem;
      font-size: .8125rem;
      font-weight: 600;
      background: none;
      border: none;
      cursor: pointer;
      white-space: nowrap;
      color: #94a3b8;
      border-bottom: 2.5px solid transparent;
      margin-bottom: -2px;
      transition: all .15s;
      font-family: "DM Sans", sans-serif
    }

    .tab-btn.active {
      color: #6366f1;
      border-bottom-color: #6366f1
    }

    .tab-btn:not(.active):hover {
      color: #475569
    }

    ::-webkit-scrollbar {
      width: 5px;
      height: 5px
    }

    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 999px
    }
  </style>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Students - EduManage Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body >
   <div class="min-h-screen">
    <div id="sidebarContainer"></div>
    <main class="min-h-screen lg:ml-[260px]">
      <div id="topbarContainer"></div>
      <div class="p-6 space-y-6">

        <div id="statsRow" class="grid grid-cols-2 sm:grid-cols-4 gap-4"></div>

        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-5">
          <div class="flex flex-col sm:flex-row gap-3 justify-between mb-5">
            <div class="flex gap-2 flex-wrap">
              <input id="searchInput" type="text" placeholder="Search name, admission no..."
                class="px-4 py-2.5 rounded-xl border border-gray-200 bg-gray-50 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm w-64" />
              <select id="filterStatus"
                class="px-3 py-2.5 rounded-xl border border-gray-200 bg-gray-50 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
                <option value="">All Status</option>
                <option value="Active">Active</option>
                <option value="Transferred">Transferred</option>
              </select>
              <select id="filterClass"
                class="px-3 py-2.5 rounded-xl border border-gray-200 bg-gray-50 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
                <option value="">All Classes</option>
              </select>
            </div>
            <button onclick="openAdmModal()"
              class="px-5 py-2.5 bg-blue-600 text-white rounded-xl font-semibold text-sm hover:bg-blue-700 shadow-lg whitespace-nowrap flex items-center gap-1.5">
              <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
              </svg>
              Admit Student
            </button>
          </div>
          <div id="tblContainer"></div>
          <div id="pgn" class="flex justify-between items-center mt-4 text-sm text-gray-500"></div>
        </div>

      </div>
    </main>
  </div>

  <!-- Admission Modal -->
  <div id="admModal"
    class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/50 backdrop-blur-sm">
    <div class="modal-box w-full max-w-5xl max-h-[90vh] overflow-y-auto">
      <div class="flex items-center justify-between px-6 py-4 border-b sticky top-0 bg-white z-10">
        <h3 class="text-lg font-bold text-gray-900">New Student Admission</h3>
        <button onclick="document.getElementById('admModal').style.display='none'"
          class="p-2 text-gray-400 hover:text-gray-600 rounded-xl">X</button>
      </div>
      <div class="px-6 py-5">
        <div class="space-y-6">
          <div>
            <h4 class="font-semibold text-gray-900 mb-3">Basic Details</h4>
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
              <div><label class="lbl">Profile Pic</label><input id="m_photo" type="file" accept="image/*" class="finput" /></div>
              <div><label class="lbl">Registration Type</label>
                <select id="m_reg_type" class="finput">
                  <option value="Manual">Manual</option>
                  <option value="Online">Online</option>
                </select>
              </div>
              <div><label class="lbl">Branch</label>
                <select id="m_branch" class="finput">
                  <option value="">Main School</option>
                </select>
              </div>
              <div><label class="lbl">Admission Type</label>
                <select id="m_at" class="finput">
                  <option value="New">New</option>
                  <option value="Transfer">Transfer</option>
                  <option value="Re-Admission">Re-Admission</option>
                </select>
              </div>
              <div><label class="lbl">First Name *</label><input id="m_fn" type="text" class="finput" placeholder="First name" /></div>
              <div><label class="lbl">Middle Name</label><input id="m_mn" type="text" class="finput" placeholder="Middle name" /></div>
              <div><label class="lbl">Last Name *</label><input id="m_ln" type="text" class="finput" placeholder="Last name" /></div>
              <div><label class="lbl">Gender *</label>
                <select id="m_gnd" class="finput">
                  <option value="">Select</option>
                  <option value="Male">Male</option>
                  <option value="Female">Female</option>
                  <option value="Other">Other</option>
                </select>
              </div>
              <div><label class="lbl">Date of Birth</label><input id="m_dob" type="date" class="finput" /></div>
              <div><label class="lbl">Phone</label><input id="m_ph" type="tel" class="finput" placeholder="Phone" /></div>
              <div><label class="lbl">Email</label><input id="m_em" type="email" class="finput" placeholder="Email" /></div>
              <div><label class="lbl">Aadhar Number</label><input id="m_aad" type="text" class="finput" placeholder="12-digit Aadhar" maxlength="12" /></div>
              <div><label class="lbl">Religion</label><input id="m_rel" type="text" class="finput" placeholder="Religion" /></div>
              <div><label class="lbl">Caste</label><input id="m_caste" type="text" class="finput" placeholder="Caste" /></div>
              <div><label class="lbl">Nationality</label><input id="m_nat" type="text" class="finput" value="Indian" /></div>
              <div><label class="lbl">Blood Group</label>
                <select id="m_bg" class="finput">
                  <option value="">Select</option>
                  <option>A+</option>
                  <option>A-</option>
                  <option>B+</option>
                  <option>B-</option>
                  <option>O+</option>
                  <option>O-</option>
                  <option>AB+</option>
                  <option>AB-</option>
                </select>
              </div>
            </div>
          </div>

          <div>
            <h4 class="font-semibold text-gray-900 mb-3">Academic Details / Transport</h4>
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
              <div><label class="lbl">Class/Course *</label>
                <select id="m_cls" class="finput" onchange="loadSections()">
                  <option value="">Select class</option>
                </select>
              </div>
              <div><label class="lbl">Section *</label>
                <select id="m_sec" class="finput">
                  <option value="">Select section</option>
                </select>
              </div>
              <div><label class="lbl">Area</label><input id="m_transport_area" type="text" class="finput" placeholder="Area" /></div>
              <div><label class="lbl">Route</label>
                <select id="m_route" class="finput" onchange="updateRouteMeta()">
                  <option value="">Select route</option>
                </select>
              </div>
              <div><label class="lbl">Bus Stop</label><input id="m_bus_stop" type="text" class="finput" placeholder="Bus stop" /></div>
              <div><label class="lbl">Bus No</label><input id="m_bus_no" type="text" class="finput" placeholder="Bus no" /></div>
              <div><label class="lbl">Charge / Month</label><input id="m_charge" type="number" class="finput" placeholder="0" readonly /></div>
              <div><label class="lbl">Referral Type</label>
                <select id="m_ref_type" class="finput" onchange="toggleReferralFields()">
                  <option value="">Select</option>
                  <option value="Referral">Referral</option>
                  <option value="Walk-In">Walk-In</option>
                  <option value="Campaign">Campaign</option>
                </select>
              </div>
            </div>
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mt-4">
              <div id="ref_num_wrap" class="hidden"><label class="lbl">Referral Number</label><input id="m_ref_num" type="text" class="finput" placeholder="Referral number" /></div>
              <div id="ref_email_wrap" class="hidden"><label class="lbl">Referral Email</label><input id="m_ref_email" type="email" class="finput" placeholder="Referral email" /></div>
            </div>
            <div class="flex flex-wrap gap-4 mt-4 text-sm text-gray-700">
              <label class="flex items-center gap-2"><input id="m_migration" type="checkbox" class="w-4 h-4 accent-blue-600" />Migration</label>
              <label class="flex items-center gap-2"><input id="m_lateral" type="checkbox" class="w-4 h-4 accent-blue-600" />Lateral Entry</label>
            </div>
            <div class="mt-4">
              <label class="lbl">For Months</label>
              <div class="grid grid-cols-3 sm:grid-cols-4 lg:grid-cols-6 gap-2 text-sm text-gray-700">
                <label class="flex items-center gap-2"><input type="checkbox" class="m_month w-4 h-4 accent-blue-600" value="Apr" />Apr</label>
                <label class="flex items-center gap-2"><input type="checkbox" class="m_month w-4 h-4 accent-blue-600" value="May" />May</label>
                <label class="flex items-center gap-2"><input type="checkbox" class="m_month w-4 h-4 accent-blue-600" value="Jun" />Jun</label>
                <label class="flex items-center gap-2"><input type="checkbox" class="m_month w-4 h-4 accent-blue-600" value="Jul" />Jul</label>
                <label class="flex items-center gap-2"><input type="checkbox" class="m_month w-4 h-4 accent-blue-600" value="Aug" />Aug</label>
                <label class="flex items-center gap-2"><input type="checkbox" class="m_month w-4 h-4 accent-blue-600" value="Sep" />Sep</label>
                <label class="flex items-center gap-2"><input type="checkbox" class="m_month w-4 h-4 accent-blue-600" value="Oct" />Oct</label>
                <label class="flex items-center gap-2"><input type="checkbox" class="m_month w-4 h-4 accent-blue-600" value="Nov" />Nov</label>
                <label class="flex items-center gap-2"><input type="checkbox" class="m_month w-4 h-4 accent-blue-600" value="Dec" />Dec</label>
                <label class="flex items-center gap-2"><input type="checkbox" class="m_month w-4 h-4 accent-blue-600" value="Jan" />Jan</label>
                <label class="flex items-center gap-2"><input type="checkbox" class="m_month w-4 h-4 accent-blue-600" value="Feb" />Feb</label>
                <label class="flex items-center gap-2"><input type="checkbox" class="m_month w-4 h-4 accent-blue-600" value="Mar" />Mar</label>
              </div>
            </div>
          </div>

          <div>
            <h4 class="font-semibold text-gray-900 mb-3">Parent / Guardian</h4>
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
              <div><label class="lbl">Father Name</label><input id="m_fa" type="text" class="finput" placeholder="Father name" /></div>
              <div><label class="lbl">Father Phone</label><input id="m_fp" type="tel" class="finput" placeholder="Father phone" /></div>
              <div><label class="lbl">Father Email</label><input id="m_fe" type="email" class="finput" placeholder="Father email" /></div>
              <div><label class="lbl">Father Occupation</label><input id="m_fo" type="text" class="finput" placeholder="Occupation" /></div>
              <div><label class="lbl">Mother Name</label><input id="m_ma" type="text" class="finput" placeholder="Mother name" /></div>
              <div><label class="lbl">Mother Phone</label><input id="m_mp" type="tel" class="finput" placeholder="Mother phone" /></div>
              <div><label class="lbl">Guardian Name</label><input id="m_guard" type="text" class="finput" placeholder="Guardian name" /></div>
              <div><label class="lbl">Guardian Phone</label><input id="m_guard_ph" type="tel" class="finput" placeholder="Guardian phone" /></div>
            </div>
          </div>

          <div>
            <div class="flex items-center justify-between mb-3">
              <h4 class="font-semibold text-gray-900">Present Address</h4>
              <label class="flex items-center gap-2 text-sm text-gray-700"><input id="same_addr" type="checkbox" class="w-4 h-4 accent-blue-600" onchange="copyPresentAddress()" />Same as Present Address</label>
            </div>
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
              <div class="lg:col-span-2"><label class="lbl">Address</label><input id="pres_address" type="text" class="finput" placeholder="Address" /></div>
              <div><label class="lbl">Village/Area</label><input id="pres_village" type="text" class="finput" placeholder="Village / Area" /></div>
              <div><label class="lbl">State</label><input id="pres_state" type="text" class="finput" placeholder="State" /></div>
              <div><label class="lbl">Post Office</label><input id="pres_post" type="text" class="finput" placeholder="Post office" /></div>
              <div><label class="lbl">Pin Code</label><input id="pres_pin" type="text" class="finput" placeholder="Pin code" /></div>
              <div><label class="lbl">City</label><input id="pres_city" type="text" class="finput" placeholder="City" /></div>
              <div><label class="lbl">Phone No</label><input id="pres_phone" type="text" class="finput" placeholder="Phone no" /></div>
            </div>
          </div>

          <div>
            <h4 class="font-semibold text-gray-900 mb-3">Permanent Address</h4>
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
              <div class="lg:col-span-2"><label class="lbl">Address</label><input id="perm_address" type="text" class="finput" placeholder="Address" /></div>
              <div><label class="lbl">Village/Area</label><input id="perm_village" type="text" class="finput" placeholder="Village / Area" /></div>
              <div><label class="lbl">State</label><input id="perm_state" type="text" class="finput" placeholder="State" /></div>
              <div><label class="lbl">Post Office</label><input id="perm_post" type="text" class="finput" placeholder="Post office" /></div>
              <div><label class="lbl">Pin Code</label><input id="perm_pin" type="text" class="finput" placeholder="Pin code" /></div>
              <div><label class="lbl">City</label><input id="perm_city" type="text" class="finput" placeholder="City" /></div>
              <div><label class="lbl">Phone No</label><input id="perm_phone" type="text" class="finput" placeholder="Phone no" /></div>
            </div>
          </div>

          <div>
            <h4 class="font-semibold text-gray-900 mb-3">Remarks</h4>
            <textarea id="m_remarks" rows="3" class="finput resize-none" placeholder="Optional remarks"></textarea>
          </div>
        </div>
      </div>
      <div class="flex gap-3 px-6 py-4 border-t sticky bottom-0 bg-white justify-end">
        <button onclick="document.getElementById('admModal').style.display='none'"
          class="px-5 py-2.5 bg-gray-100 text-gray-700 rounded-xl font-medium text-sm hover:bg-gray-200">Cancel</button>
        <button onclick="submitAdm()"
          class="px-5 py-2.5 bg-blue-600 text-white rounded-xl font-medium text-sm hover:bg-blue-700 shadow-lg">Admit
          Student</button>
      </div>
    </div>
  </div>

  <!-- Detail Modal -->
  <div id="detModal"
    class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/50 backdrop-blur-sm">
    <div class="modal-box w-full max-w-xl max-h-[90vh] overflow-y-auto">
      <div class="flex items-center justify-between px-6 py-4 border-b sticky top-0 bg-white z-10">
        <h3 class="text-lg font-bold text-gray-900">Student Profile</h3>
        <button onclick="document.getElementById('detModal').style.display='none'"
          class="p-2 text-gray-400 hover:text-gray-600 rounded-xl">X</button>
      </div>
      <div id="detContent" class="px-6 py-5"></div>
    </div>
  </div>

  <div id="toast" class="hidden fixed bottom-6 right-6 z-50 px-6 py-3 rounded-xl text-white font-medium shadow-2xl">
  </div>
  <style>
    .lbl {
      display: block;
      font-size: .875rem;
      font-weight: 500;
      color: #374151;
      margin-bottom: .375rem
    }

    .finput {
      width: 100%;
      padding: .625rem .75rem;
      border-radius: .75rem;
      border: 1px solid #e5e7eb;
      background: #f9fafb;
      font-size: .875rem;
      outline: none;
      transition: all .15s
    }

    .finput:focus {
      background: #fff;
      ring: 2px;
      ring-color: #3b82f6;
      border-color: #3b82f6
    }
  </style>
  <script src="js/api.js"></script>
  <script src="js/layout.js"></script>
  <script>
    requireAuth();
    document.getElementById('sidebarContainer').innerHTML = renderSidebar('students');
    document.getElementById('topbarContainer').innerHTML = renderTopbar('Student Management', 'Manage admissions and profiles');
    const schoolId = localStorage.getItem('school_id'), ayId = localStorage.getItem('ay_id');
    let curPage = 1, totalPgs = 1;
    let routeCache = [];
    let branchCache = [];

    async function loadStats() {
      if (!schoolId) return;
      try { const r = await StudentAPI.stats(schoolId, ayId); if (r?.data) { const d = r.data; document.getElementById('statsRow').innerHTML = statCard('Total', d.total || 0, '&#128104;&#8205;&#127979;', 'blue') + statCard('Male', d.by_gender?.male || 0, '&#128104;', 'indigo') + statCard('Female', d.by_gender?.female || 0, '&#128105;', 'purple') + statCard('Transferred', d.by_status?.transferred || 0, '&#128640;', 'orange'); } } catch (e) { }
    }

    async function loadClasses() {
      if (!schoolId) return;
      try {
        const r = await ClassAPI.list(schoolId, ayId); const opts = (r?.data || []).map(c => `<option value="${c.id}" data-secs='${JSON.stringify(c.sections)}'>${c.name}</option>`).join('');
        document.getElementById('filterClass').innerHTML = '<option value="">All Classes</option>' + opts;
        document.getElementById('m_cls').innerHTML = '<option value="">Select class</option>' + opts;
      } catch (e) { }
    }

    async function loadSchoolMeta() {
      if (!schoolId) return;
      try {
        const r = await SchoolAPI.get(schoolId);
        branchCache = r?.data?.branches || [];
        const branchOpts = '<option value="">Main School</option>' + branchCache.map(b => `<option value="${b.code}" data-name="${b.name}">${b.name}</option>`).join('');
        document.getElementById('m_branch').innerHTML = branchOpts;
      } catch (e) { }
    }

    async function loadRoutes() {
      if (!schoolId) return;
      try {
        const r = await TransportAPI.getRoutes(schoolId);
        routeCache = r?.data || [];
        document.getElementById('m_route').innerHTML = '<option value="">Select route</option>' + routeCache.map(rt => `<option value="${rt.id}">${rt.route_name}</option>`).join('');
      } catch (e) { }
    }

    function updateRouteMeta() {
      const route = routeCache.find(r => r.id === document.getElementById('m_route').value);
      document.getElementById('m_charge').value = route ? route.fee_per_month || 0 : '';
      if (route && !document.getElementById('m_bus_stop').value && route.stops?.length) {
        document.getElementById('m_bus_stop').value = route.stops[0].name || '';
      }
      if (route && !document.getElementById('m_transport_area').value) {
        document.getElementById('m_transport_area').value = route.start_point || '';
      }
    }

    function toggleReferralFields() {
      const show = document.getElementById('m_ref_type').value === 'Referral';
      document.getElementById('ref_num_wrap').classList.toggle('hidden', !show);
      document.getElementById('ref_email_wrap').classList.toggle('hidden', !show);
    }

    function collectAddress(prefix) {
      return {
        address: document.getElementById(`${prefix}_address`).value || null,
        village_area: document.getElementById(`${prefix}_village`).value || null,
        post_office: document.getElementById(`${prefix}_post`).value || null,
        city: document.getElementById(`${prefix}_city`).value || null,
        state: document.getElementById(`${prefix}_state`).value || null,
        pin_code: document.getElementById(`${prefix}_pin`).value || null,
        phone_no: document.getElementById(`${prefix}_phone`).value || null
      };
    }

    function copyPresentAddress() {
      if (!document.getElementById('same_addr').checked) return;
      ['address', 'village', 'post', 'city', 'state', 'pin', 'phone'].forEach(field => {
        document.getElementById(`perm_${field}`).value = document.getElementById(`pres_${field}`).value;
      });
    }

    function loadSections() {
      const el = document.getElementById('m_cls'), secEl = document.getElementById('m_sec');
      const opt = el.options[el.selectedIndex];
      secEl.innerHTML = '<option value="">Select section</option>';
      if (!opt || !opt.dataset.secs) return;
      JSON.parse(opt.dataset.secs).forEach(s => secEl.innerHTML += `<option value="${s.id}">${s.name}</option>`);
    }

    async function loadStudents(page = 1) {
      if (!schoolId) { document.getElementById('tblContainer').innerHTML = '<div class="text-center py-12 text-gray-400"><div class="text-4xl mb-2">&#9888;</div><p>Configure school first</p></div>'; return; }
      const params = { school_id: schoolId, page, per_page: 15 };
      if (ayId) params.academic_year_id = ayId;
      const srch = document.getElementById('searchInput').value.trim();
      const stat = document.getElementById('filterStatus').value;
      const cls = document.getElementById('filterClass').value;
      if (srch) params.search = srch; if (stat) params.admission_status = stat; if (cls) params.classroom_id = cls;
      try {
        const res = await StudentAPI.list(params); const students = res?.data || []; const meta = res?.meta || {};
        totalPgs = meta.total_pages || 1; curPage = meta.page || 1;
        const hdrs = ['Adm No', 'Name', 'Class/Sec', 'Gender', 'Father', 'Phone', 'Status', 'Actions'];
        const rows = students.map(s => `
      <td class="px-4 py-3 font-mono text-xs text-gray-500">${s.admission_no || '-'}</td>
      <td class="px-4 py-3"><div class="flex items-center gap-2">
        <div class="w-8 h-8 bg-blue-100 rounded-xl flex items-center justify-center text-blue-600 font-bold text-xs flex-shrink-0">${s.first_name.charAt(0).toUpperCase()}</div>
        <div><div class="font-medium text-gray-900 text-sm">${s.full_name}</div><div class="text-xs text-gray-400">${s.student_id || ''}</div></div>
      </div></td>
      <td class="px-4 py-3 text-sm text-gray-600">${s.classroom_name || s.classroom || '-'}${(s.section_name || s.section) ? ' / ' + (s.section_name || s.section) : ''}</td>
      <td class="px-4 py-3 text-sm text-gray-600">${s.gender || '-'}</td>
      <td class="px-4 py-3 text-sm text-gray-600">${s.father_name || '-'}</td>
      <td class="px-4 py-3 text-sm text-gray-600">${s.phone || s.father_phone || '-'}</td>
      <td class="px-4 py-3">${tdBadge(s.admission_status, s.admission_status === 'Active' ? 'green' : s.admission_status === 'Transferred' ? 'orange' : 'gray')}</td>
      <td class="px-4 py-3"><div class="flex gap-1">
        <button onclick="viewStudent('${s.id}')" class="p-1.5 text-blue-600 hover:bg-blue-50 rounded-lg" title="View">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
        </button>
        <button onclick="delStudent('${s.id}','${s.full_name.replace(/'/g, "\'")}')" class="p-1.5 text-red-500 hover:bg-red-50 rounded-lg" title="Delete">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
        </button>
      </div></td>
    `);
        document.getElementById('tblContainer').innerHTML = buildTable(hdrs, rows, 'No students found. Admit your first student!');
        document.getElementById('pgn').innerHTML = meta.total ? `<span>Showing ${(curPage - 1) * 15 + 1}–${Math.min(curPage * 15, meta.total)} of ${meta.total}</span><div class="flex gap-2"><button onclick="loadStudents(${curPage - 1})" ${curPage <= 1 ? 'disabled' : ''} class="px-3 py-1.5 rounded-lg border disabled:opacity-40 text-sm">&#8592;</button><span class="px-3 py-1.5 text-sm">${curPage}/${totalPgs}</span><button onclick="loadStudents(${curPage + 1})" ${curPage >= totalPgs ? 'disabled' : ''} class="px-3 py-1.5 rounded-lg border disabled:opacity-40 text-sm">&#8594;</button></div>` : '';
      } catch (e) { document.getElementById('tblContainer').innerHTML = `<div class="text-center py-12 text-red-400"><p>Error: ${e.message}</p></div>`; }
    }

    async function viewStudent(id) {
      try {
        const res = await StudentAPI.get(id); const s = res.data;
        document.getElementById('detContent').innerHTML = `
      <div class="flex items-center gap-4 pb-5 border-b mb-5">
        <div class="w-16 h-16 bg-gradient-to-br from-blue-500 to-violet-600 rounded-2xl flex items-center justify-center text-white text-2xl font-bold">${s.first_name.charAt(0).toUpperCase()}</div>
        <div><h4 class="text-xl font-bold">${s.full_name}</h4><p class="text-gray-500 text-sm">${s.admission_no} · ${s.branch_name || 'Main School'} · ${s.classroom_name || ''} ${s.section_name || ''}</p></div>
      </div>
      <div class="grid grid-cols-2 gap-4 text-sm">
        <div class="space-y-2">
          <div class="flex gap-2"><span class="text-gray-400 w-24">Gender:</span><span class="font-medium">${s.gender || '-'}</span></div>
          <div class="flex gap-2"><span class="text-gray-400 w-24">DOB:</span><span class="font-medium">${formatDate(s.date_of_birth)}</span></div>
          <div class="flex gap-2"><span class="text-gray-400 w-24">Phone:</span><span class="font-medium">${s.phone || '-'}</span></div>
          <div class="flex gap-2"><span class="text-gray-400 w-24">Blood Grp:</span><span class="font-medium">${s.medical_info?.blood_group || '-'}</span></div>
        </div>
        <div class="space-y-2">
          <div class="flex gap-2"><span class="text-gray-400 w-24">Father:</span><span class="font-medium">${s.parent_info?.father_name || '-'}</span></div>
          <div class="flex gap-2"><span class="text-gray-400 w-24">Father Ph:</span><span class="font-medium">${s.parent_info?.father_phone || '-'}</span></div>
          <div class="flex gap-2"><span class="text-gray-400 w-24">Mother:</span><span class="font-medium">${s.parent_info?.mother_name || '-'}</span></div>
          <div class="flex gap-2"><span class="text-gray-400 w-24">Adm Date:</span><span class="font-medium">${formatDate(s.admission_date)}</span></div>
        </div>
      </div>
      <div class="grid grid-cols-2 gap-4 text-sm mt-4">
        <div class="space-y-2">
          <div class="flex gap-2"><span class="text-gray-400 w-24">Route:</span><span class="font-medium">${s.transport_route_name || '-'}</span></div>
          <div class="flex gap-2"><span class="text-gray-400 w-24">Bus Stop:</span><span class="font-medium">${s.bus_stop || '-'}</span></div>
          <div class="flex gap-2"><span class="text-gray-400 w-24">Months:</span><span class="font-medium">${(s.transport_months || []).join(', ') || '-'}</span></div>
        </div>
        <div class="space-y-2">
          <div class="flex gap-2"><span class="text-gray-400 w-24">Referral:</span><span class="font-medium">${s.referral_type || '-'}</span></div>
          <div class="flex gap-2"><span class="text-gray-400 w-24">Reg Type:</span><span class="font-medium">${s.registration_type || '-'}</span></div>
          <div class="flex gap-2"><span class="text-gray-400 w-24">Address:</span><span class="font-medium">${s.current_address || '-'}</span></div>
        </div>
      </div>
      <div class="mt-5 flex gap-3">
        <button onclick="genTC('${id}','${s.full_name.replace(/'/g, "\'")}')" class="px-4 py-2 bg-orange-100 text-orange-700 rounded-xl text-sm font-medium hover:bg-orange-200">Generate TC</button>
      </div>`;
        document.getElementById('detModal').style.display = 'flex';
      } catch (e) { showToast('Error: ' + e.message, 'error'); }
    }

    async function genTC(id, name) {
      if (!confirm('Generate TC for ' + name + '?')) return;
      try { const r = await StudentAPI.generateTC(id, { conduct: 'Good', fee_clearance: false }); showToast('TC ' + r.data.tc_number + ' generated!'); document.getElementById('detModal').style.display = 'none'; loadStudents(curPage); }
      catch (e) { showToast('TC failed: ' + e.message, 'error'); }
    }

    async function delStudent(id, name) {
      if (!confirm('Deactivate "' + name + '"?')) return;
      try { await StudentAPI.delete(id); showToast('Student deactivated'); loadStudents(curPage); loadStats(); }
      catch (e) { showToast('Error: ' + e.message, 'error'); }
    }

    function openAdmModal() {
      document.querySelectorAll('#admModal input,#admModal select,#admModal textarea').forEach(i => { if (i.type === 'checkbox') i.checked = false; else i.value = ''; });
      document.getElementById('m_nat').value = 'Indian';
      toggleReferralFields();
      document.getElementById('admModal').style.display = 'flex';
    }

    async function submitAdm() {
      if (!schoolId) { showToast('Configure school first', 'error'); return; }
      const fn = document.getElementById('m_fn').value.trim(), ln = document.getElementById('m_ln').value.trim();
      const gnd = document.getElementById('m_gnd').value, cls = document.getElementById('m_cls').value, sec = document.getElementById('m_sec').value;
      if (!fn || !ln || !gnd || !cls || !sec) { showToast('Fill all required fields (*)', 'error'); return; }
      try {
        const branchEl = document.getElementById('m_branch');
        const branchOpt = branchEl.options[branchEl.selectedIndex];
        const routeId = document.getElementById('m_route').value || null;
        const months = Array.from(document.querySelectorAll('.m_month:checked')).map(el => el.value);
        const r = await StudentAPI.create({
          first_name: fn, middle_name: document.getElementById('m_mn').value || null, last_name: ln, gender: gnd,
          date_of_birth: document.getElementById('m_dob').value ? new Date(document.getElementById('m_dob').value).toISOString() : null,
          phone: document.getElementById('m_ph').value || null, email: document.getElementById('m_em').value || null,
          religion: document.getElementById('m_rel').value || null,
          caste: document.getElementById('m_caste').value || null,
          nationality: document.getElementById('m_nat').value || 'Indian',
          aadhar_number: document.getElementById('m_aad').value || null,
          school_id: schoolId, academic_year_id: ayId || '',
          classroom_id: cls, section_id: sec,
          branch_code: branchEl.value || null,
          branch_name: branchOpt?.dataset?.name || null,
          admission_type: document.getElementById('m_at').value,
          registration_type: document.getElementById('m_reg_type').value,
          parent_info: {
            father_name: document.getElementById('m_fa').value || null,
            father_phone: document.getElementById('m_fp').value || null,
            father_email: document.getElementById('m_fe').value || null,
            father_occupation: document.getElementById('m_fo').value || null,
            mother_name: document.getElementById('m_ma').value || null,
            mother_phone: document.getElementById('m_mp').value || null,
            guardian_name: document.getElementById('m_guard').value || null,
            guardian_phone: document.getElementById('m_guard_ph').value || null
          },
          medical_info: { blood_group: document.getElementById('m_bg').value || null },
          current_address_details: collectAddress('pres'),
          permanent_address_details: collectAddress('perm'),
          uses_transport: !!routeId,
          transport_route_id: routeId,
          transport_area: document.getElementById('m_transport_area').value || null,
          bus_stop: document.getElementById('m_bus_stop').value || null,
          bus_no: document.getElementById('m_bus_no').value || null,
          transport_months: months,
          migration: document.getElementById('m_migration').checked,
          lateral_entry: document.getElementById('m_lateral').checked,
          referral_type: document.getElementById('m_ref_type').value || null,
          referral_number: document.getElementById('m_ref_num').value || null,
          referral_email: document.getElementById('m_ref_email').value || null,
          remarks: document.getElementById('m_remarks').value || null
        });
        const photo = document.getElementById('m_photo').files[0];
        if (photo) {
          const fd = new FormData();
          fd.append('file', photo);
          await StudentAPI.uploadPhoto(r.data.id, fd);
        }
        showToast('Admitted! No: ' + r.data.admission_no);
        document.getElementById('admModal').style.display = 'none';
        loadStudents(1); loadStats();
      } catch (e) { showToast('Error: ' + e.message, 'error'); }
    }

    const dbLoad = debounce(() => loadStudents(1));
    document.getElementById('searchInput').addEventListener('input', dbLoad);
    document.getElementById('filterStatus').addEventListener('change', () => loadStudents(1));
    document.getElementById('filterClass').addEventListener('change', () => loadStudents(1));
    loadStats(); loadClasses(); loadSchoolMeta(); loadRoutes(); loadStudents();
  </script>
</body>

</html>
