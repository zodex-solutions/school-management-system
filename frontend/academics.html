<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="icon" type="image/png" href="/public/circlelogo.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap"
    rel="stylesheet">
  <style>
    * {
      box-sizing: border-box
    }

    body {
      font-family: "DM Sans", sans-serif;
      background: #f0f2f8;
      color: #1e293b
    }

    h1,
    h2,
    h3,
    h4,
    .font-outfit {
      font-family: "Outfit", sans-serif
    }

    .finput {
      width: 100%;
      padding: .625rem .875rem;
      border-radius: .75rem;
      border: 1.5px solid #e2e8f0;
      background: #f0f2f8;
      font-size: .875rem;
      outline: none;
      transition: all .15s;
      color: #1e293b
    }

    .finput:focus {
      background: #fff;
      border-color: #6366f1;
      box-shadow: 0 0 0 3px rgba(99, 102, 241, .12)
    }

    .lbl {
      display: block;
      font-size: .8125rem;
      font-weight: 600;
      color: #475569;
      margin-bottom: .375rem
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      background: rgba(15, 23, 42, .55);
      backdrop-filter: blur(4px)
    }

    .modal-box {
      background: #fff;
      border-radius: 1.5rem;
      box-shadow: 0 25px 50px rgba(0, 0, 0, .22);
      width: 100%;
      overflow: hidden;
      animation: modalIn .2s ease
    }

    @keyframes modalIn {
      from {
        opacity: 0;
        transform: scale(.96) translateY(6px)
      }

      to {
        opacity: 1;
        transform: scale(1) translateY(0)
      }
    }

    .tab-bar {
      display: flex;
      border-bottom: 2px solid #f1f5f9;
      overflow-x: auto;
      gap: .25rem;
      padding: 0 1rem
    }

    .tab-bar::-webkit-scrollbar {
      display: none
    }

    .tab-btn {
      padding: .875rem 1.125rem;
      font-size: .8125rem;
      font-weight: 600;
      background: none;
      border: none;
      cursor: pointer;
      white-space: nowrap;
      color: #94a3b8;
      border-bottom: 2.5px solid transparent;
      margin-bottom: -2px;
      transition: all .15s;
      font-family: "DM Sans", sans-serif
    }

    .tab-btn.active {
      color: #6366f1;
      border-bottom-color: #6366f1
    }

    .tab-btn:not(.active):hover {
      color: #475569
    }

    ::-webkit-scrollbar {
      width: 5px;
      height: 5px
    }

    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 999px
    }
  </style>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Academics - EduManage Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .finput {
      width: 100%;
      padding: .625rem .75rem;
      border-radius: .75rem;
      border: 1px solid #e5e7eb;
      background: #f9fafb;
      font-size: .875rem;
      outline: none
    }

    .finput:focus {
      background: #fff;
      border-color: #3b82f6
    }

    .lbl {
      display: block;
      font-size: .875rem;
      font-weight: 500;
      color: #374151;
      margin-bottom: .375rem
    }
  </style>
</head>

<body>
  <div class="min-h-screen">
    <div id="sidebarContainer"></div>
    <main class="min-h-screen lg:ml-[260px]">
      <div id="topbarContainer"></div>
      <div class="p-6 space-y-6">

        <div
          style="background:#fff;border-radius:1.25rem;border:1.5px solid #f1f5f9;box-shadow:0 1px 3px rgba(0,0,0,.04)">
          <div class="tab-bar">
            <button onclick="switchAcTab(0)"
              class="actab px-5 py-4 text-sm font-semibold border-b-2 border-blue-600 text-blue-600 whitespace-nowrap">Homework</button>
            <button onclick="switchAcTab(1)"
              class="actab px-5 py-4 text-sm font-semibold border-b-2 border-transparent text-gray-500 hover:text-gray-700 whitespace-nowrap">Study
              Material</button>
            <button onclick="switchAcTab(2)"
              class="actab px-5 py-4 text-sm font-semibold border-b-2 border-transparent text-gray-500 hover:text-gray-700 whitespace-nowrap">Online
              Classes</button>
            <button onclick="switchAcTab(3)"
              class="actab px-5 py-4 text-sm font-semibold border-b-2 border-transparent text-gray-500 hover:text-gray-700 whitespace-nowrap">Timetable</button>
          </div>

          <!-- Homework -->
          <div id="actab0" class="p-5">
            <div class="flex justify-between mb-4">
              <h4 class="font-bold text-gray-900">Homework Assignments</h4>
              <button onclick="document.getElementById('hwModal').style.display='flex';loadHwForm()"
                class="px-4 py-2 bg-blue-600 text-white rounded-xl text-sm font-medium hover:bg-blue-700">+ Assign
                Homework</button>
            </div>
            <div id="hwTable"></div>
          </div>

          <!-- Study Material -->
          <div id="actab1" class="p-5 hidden">
            <div class="flex justify-between mb-4">
              <h4 class="font-bold text-gray-900">Study Materials</h4>
              <button onclick="document.getElementById('matModal').style.display='flex';loadMatForm()"
                class="px-4 py-2 bg-blue-600 text-white rounded-xl text-sm font-medium hover:bg-blue-700">+ Upload
                Material</button>
            </div>
            <div id="matTable"></div>
          </div>

          <!-- Online Classes -->
          <div id="actab2" class="p-5 hidden">
            <div class="flex justify-between mb-4">
              <h4 class="font-bold text-gray-900">Online Classes</h4>
              <button onclick="document.getElementById('ocModal').style.display='flex';loadOcForm()"
                class="px-4 py-2 bg-blue-600 text-white rounded-xl text-sm font-medium hover:bg-blue-700">+ Schedule
                Class</button>
            </div>
            <div id="ocTable"></div>
          </div>

          <!-- Timetable -->
          <div id="actab3" class="p-5 hidden">
            <div class="flex justify-between mb-4">
              <h4 class="font-bold text-gray-900">Class Timetable</h4>
            </div>
            <div class="grid grid-cols-3 gap-4 mb-5">
              <div><label class="lbl">Class</label><select id="tt_cls" class="finput">
                  <option value="">Select class</option>
                </select></div>
              <div><label class="lbl">Section</label><select id="tt_sec" class="finput">
                  <option value="">Select section</option>
                </select></div>
              <div class="flex items-end"><button onclick="viewTimetable()"
                  class="w-full px-4 py-2.5 bg-blue-600 text-white rounded-xl text-sm font-medium hover:bg-blue-700">View
                  Timetable</button></div>
            </div>
            <div id="ttDisplay"></div>
          </div>
        </div>

      </div>
    </main>
  </div>

  <!-- Homework Modal -->
  <div id="hwModal" class="modal-overlay" style="display:none">
    <div class="modal-box w-full max-w-md">
      <div class="flex justify-between items-center px-6 py-4 border-b">
        <h3 class="font-bold text-gray-900">Assign Homework</h3><button
          onclick="document.getElementById('hwModal').style.display='none'"
          class="p-2 text-gray-400 hover:text-gray-600 rounded-xl text-lg">×</button>
      </div>
      <div class="px-6 py-5 space-y-4">
        <div><label class="lbl">Title *</label><input id="hw_title" class="finput" placeholder="Homework title" /></div>
        <div><label class="lbl">Teacher *</label><select id="hw_teacher" class="finput">
            <option value="">Select teacher</option>
          </select></div>
        <div><label class="lbl">Class *</label><select id="hw_cls" class="finput">
            <option value="">Select class</option>
          </select></div>
        <div><label class="lbl">Subject *</label><select id="hw_sub" class="finput">
            <option value="">Select subject</option>
          </select></div>
        <div><label class="lbl">Description *</label><textarea id="hw_desc" rows="3" class="finput resize-none"
            placeholder="Describe the homework..."></textarea></div>
        <div class="grid grid-cols-2 gap-3">
          <div><label class="lbl">Due Date *</label><input id="hw_due" type="date" class="finput" /></div>
          <div><label class="lbl">Max Marks</label><input id="hw_marks" type="number" class="finput" value="10" /></div>
        </div>
      </div>
      <div class="flex gap-3 px-6 py-4 border-t justify-end">
        <button onclick="document.getElementById('hwModal').style.display='none'"
          class="px-5 py-2.5 bg-gray-100 text-gray-700 rounded-xl text-sm">Cancel</button>
        <button onclick="saveHomework()"
          class="px-5 py-2.5 bg-blue-600 text-white rounded-xl text-sm font-medium">Assign</button>
      </div>
    </div>
  </div>

  <!-- Material Modal -->
  <div id="matModal" class="modal-overlay" style="display:none">
    <div class="modal-box w-full max-w-md">
      <div class="flex justify-between items-center px-6 py-4 border-b">
        <h3 class="font-bold text-gray-900">Upload Study Material</h3><button
          onclick="document.getElementById('matModal').style.display='none'"
          class="p-2 text-gray-400 hover:text-gray-600 rounded-xl text-lg">×</button>
      </div>
      <div class="px-6 py-5 space-y-4">
        <div><label class="lbl">Title *</label><input id="mat_title" class="finput" placeholder="Material title" />
        </div>
        <div><label class="lbl">Teacher *</label><select id="mat_teacher" class="finput">
            <option value="">Select teacher</option>
          </select></div>
        <div><label class="lbl">Class *</label><select id="mat_cls" class="finput">
            <option value="">Select class</option>
          </select></div>
        <div><label class="lbl">Subject *</label><select id="mat_sub" class="finput">
            <option value="">Select subject</option>
          </select></div>
        <div><label class="lbl">Type</label><select id="mat_type" class="finput">
            <option value="Notes">Notes</option>
            <option value="Slides">Slides</option>
            <option value="Video">Video</option>
            <option value="Link">Link</option>
            <option value="Book">Book</option>
          </select></div>
        <div><label class="lbl">Link / URL</label><input id="mat_link" class="finput" placeholder="https://..." /></div>
        <div><label class="lbl">Description</label><textarea id="mat_desc" rows="2" class="finput resize-none"
            placeholder="Optional description"></textarea></div>
      </div>
      <div class="flex gap-3 px-6 py-4 border-t justify-end">
        <button onclick="document.getElementById('matModal').style.display='none'"
          class="px-5 py-2.5 bg-gray-100 text-gray-700 rounded-xl text-sm">Cancel</button>
        <button onclick="saveMaterial()"
          class="px-5 py-2.5 bg-blue-600 text-white rounded-xl text-sm font-medium">Upload</button>
      </div>
    </div>
  </div>

  <!-- Online Class Modal -->
  <div id="ocModal" class="modal-overlay" style="display:none">
    <div class="modal-box w-full max-w-md">
      <div class="flex justify-between items-center px-6 py-4 border-b">
        <h3 class="font-bold text-gray-900">Schedule Online Class</h3><button
          onclick="document.getElementById('ocModal').style.display='none'"
          class="p-2 text-gray-400 hover:text-gray-600 rounded-xl text-lg">×</button>
      </div>
      <div class="px-6 py-5 space-y-4">
        <div><label class="lbl">Title *</label><input id="oc_title" class="finput" placeholder="Class title" /></div>
        <div><label class="lbl">Teacher *</label><select id="oc_teacher" class="finput">
            <option value="">Select teacher</option>
          </select></div>
        <div><label class="lbl">Class *</label><select id="oc_cls" class="finput">
            <option value="">Select class</option>
          </select></div>
        <div><label class="lbl">Subject *</label><select id="oc_sub" class="finput">
            <option value="">Select subject</option>
          </select></div>
        <div><label class="lbl">Platform</label><select id="oc_platform" class="finput">
            <option value="Google Meet">Google Meet</option>
            <option value="Zoom">Zoom</option>
            <option value="Teams">Microsoft Teams</option>
          </select></div>
        <div><label class="lbl">Meeting Link *</label><input id="oc_link" class="finput"
            placeholder="https://meet.google.com/..." /></div>
        <div class="grid grid-cols-2 gap-3">
          <div><label class="lbl">Scheduled At *</label><input id="oc_time" type="datetime-local" class="finput" />
          </div>
          <div><label class="lbl">Duration (mins)</label><input id="oc_dur" type="number" class="finput" value="45" />
          </div>
        </div>
      </div>
      <div class="flex gap-3 px-6 py-4 border-t justify-end">
        <button onclick="document.getElementById('ocModal').style.display='none'"
          class="px-5 py-2.5 bg-gray-100 text-gray-700 rounded-xl text-sm">Cancel</button>
        <button onclick="scheduleClass()"
          class="px-5 py-2.5 bg-blue-600 text-white rounded-xl text-sm font-medium">Schedule</button>
      </div>
    </div>
  </div>

  <div id="toast" class="hidden fixed bottom-6 right-6 z-50 px-6 py-3 rounded-xl text-white font-medium shadow-2xl">
  </div>
  <script src="js/api.js"></script>
  <script src="js/layout.js"></script>
  <script>
    requireAuth();
    document.getElementById('sidebarContainer').innerHTML = renderSidebar('academics');
    document.getElementById('topbarContainer').innerHTML = renderTopbar('Academic Management', 'Timetable, homework, materials and online classes');
    const schoolId = localStorage.getItem('school_id'), ayId = localStorage.getItem('ay_id');

    function switchAcTab(idx) {
      document.querySelectorAll('.actab').forEach((b, i) => { b.classList.toggle('border-blue-600', i === idx); b.classList.toggle('text-blue-600', i === idx); b.classList.toggle('border-transparent', i !== idx); b.classList.toggle('text-gray-500', i !== idx); });
      document.querySelectorAll('[id^="actab"]').forEach(t => { t.classList.toggle('hidden', parseInt(t.id.replace('actab', '')) !== idx); });
      if (idx === 0) loadHomework(); if (idx === 1) loadMaterials(); if (idx === 2) loadOnlineClasses(); if (idx === 3) loadTtClasses();
    }

    async function loadFormData(selIds) {
      if (!schoolId) return;
      try {
        const [tr, cr, sr] = await Promise.allSettled([StaffAPI.list({ school_id: schoolId, staff_type: 'Teaching', per_page: 100 }), ClassAPI.list(schoolId, ayId), SubjectAPI.list(schoolId)]);
        const teacherOpts = '<option value="">Select teacher</option>' + (tr.value?.data || []).map(t => `<option value="${t.id}">${t.full_name}</option>`).join('');
        const clsOpts = '<option value="">Select class</option>' + (cr.value?.data || []).map(c => `<option value="${c.id}">${c.name}</option>`).join('');
        const subOpts = '<option value="">Select subject</option>' + (sr.value?.data || []).map(s => `<option value="${s.id}">${s.name}</option>`).join('');
        selIds.forEach(([teachSel, clsSel, subSel]) => {
          if (teachSel) document.getElementById(teachSel).innerHTML = teacherOpts;
          if (clsSel) document.getElementById(clsSel).innerHTML = clsOpts;
          if (subSel) document.getElementById(subSel).innerHTML = subOpts;
        });
      } catch (e) { }
    }
    function loadHwForm() { loadFormData([['hw_teacher', 'hw_cls', 'hw_sub']]); }
    function loadMatForm() { loadFormData([['mat_teacher', 'mat_cls', 'mat_sub']]); }
    function loadOcForm() { loadFormData([['oc_teacher', 'oc_cls', 'oc_sub']]); }

    async function saveHomework() {
      if (!schoolId || !ayId) { showToast('Configure school and academic year', 'error'); return; }
      const t = document.getElementById('hw_title').value.trim(), teacher = document.getElementById('hw_teacher').value, cls = document.getElementById('hw_cls').value, sub = document.getElementById('hw_sub').value;
      const desc = document.getElementById('hw_desc').value.trim(), due = document.getElementById('hw_due').value;
      if (!t || !teacher || !cls || !sub || !desc || !due) { showToast('Fill all required fields', 'error'); return; }
      try {
        await AcademicAPI.createHomework({ school_id: schoolId, academic_year_id: ayId, teacher_id: teacher, classroom_id: cls, subject_id: sub, title: t, description: desc, due_date: new Date(due).toISOString(), max_marks: parseFloat(document.getElementById('hw_marks').value) || 10 });
        showToast('Homework assigned!'); document.getElementById('hwModal').style.display = 'none'; loadHomework();
      } catch (e) { showToast('Error: ' + e.message, 'error'); }
    }

    async function loadHomework() {
      if (!schoolId) { document.getElementById('hwTable').innerHTML = '<div class="text-center py-8 text-gray-400">Configure school first</div>'; return; }
      try {
        const r = await AcademicAPI.getHomework({ school_id: schoolId }); const hws = r?.data || [];
        const hdrs = ['Title', 'Class', 'Subject', 'Teacher', 'Assigned', 'Due Date', 'Max Marks'];
        const rows = hws.map(h => `
      <td class="px-4 py-3 font-medium text-gray-900 text-sm">${h.title}</td>
      <td class="px-4 py-3 text-sm text-gray-600">${h.classroom || '-'} ${h.section ? '/ ' + h.section : ''}</td>
      <td class="px-4 py-3 text-sm text-gray-600">${h.subject || '-'}</td>
      <td class="px-4 py-3 text-sm text-gray-600">${h.teacher || '-'}</td>
      <td class="px-4 py-3 text-sm text-gray-500">${formatDate(h.assigned_date)}</td>
      <td class="px-4 py-3 text-sm font-medium text-orange-600">${formatDate(h.due_date)}</td>
      <td class="px-4 py-3 text-sm text-gray-700">${h.max_marks}</td>
    `);
        document.getElementById('hwTable').innerHTML = buildTable(hdrs, rows, 'No homework assigned yet');
      } catch (e) { }
    }

    async function saveMaterial() {
      if (!schoolId || !ayId) { showToast('Configure school and academic year', 'error'); return; }
      const t = document.getElementById('mat_title').value.trim(), teacher = document.getElementById('mat_teacher').value, cls = document.getElementById('mat_cls').value, sub = document.getElementById('mat_sub').value;
      if (!t || !teacher || !cls || !sub) { showToast('Fill required fields', 'error'); return; }
      try {
        await AcademicAPI.uploadMaterial({ school_id: schoolId, academic_year_id: ayId, teacher_id: teacher, classroom_id: cls, subject_id: sub, title: t, description: document.getElementById('mat_desc').value || null, material_type: document.getElementById('mat_type').value, external_link: document.getElementById('mat_link').value || null });
        showToast('Material uploaded!'); document.getElementById('matModal').style.display = 'none'; loadMaterials();
      } catch (e) { showToast('Error: ' + e.message, 'error'); }
    }

    async function loadMaterials() {
      if (!schoolId) { document.getElementById('matTable').innerHTML = '<div class="text-center py-8 text-gray-400">Configure school first</div>'; return; }
      try {
        const r = await AcademicAPI.getMaterials({ school_id: schoolId }); const mats = r?.data || [];
        const hdrs = ['Title', 'Type', 'Class', 'Subject', 'Teacher', 'Link', 'Uploaded'];
        const rows = mats.map(m => `
      <td class="px-4 py-3 font-medium text-gray-900 text-sm">${m.title}</td>
      <td class="px-4 py-3">${tdBadge(m.material_type, 'blue')}</td>
      <td class="px-4 py-3 text-sm text-gray-600">${m.classroom || '-'}</td>
      <td class="px-4 py-3 text-sm text-gray-600">${m.subject || '-'}</td>
      <td class="px-4 py-3 text-sm text-gray-600">${m.teacher || '-'}</td>
      <td class="px-4 py-3">${m.external_link ? `<a href="${m.external_link}" target="_blank" class="text-blue-600 text-xs hover:underline">Open Link</a>` : '-'}</td>
      <td class="px-4 py-3 text-sm text-gray-500">${formatDate(m.upload_date)}</td>
    `);
        document.getElementById('matTable').innerHTML = buildTable(hdrs, rows, 'No materials uploaded yet');
      } catch (e) { }
    }

    async function scheduleClass() {
      if (!schoolId) { showToast('Configure school first', 'error'); return; }
      const t = document.getElementById('oc_title').value.trim(), teacher = document.getElementById('oc_teacher').value, cls = document.getElementById('oc_cls').value, sub = document.getElementById('oc_sub').value, link = document.getElementById('oc_link').value.trim(), time = document.getElementById('oc_time').value;
      if (!t || !teacher || !cls || !sub || !link || !time) { showToast('Fill all required fields', 'error'); return; }
      try {
        await AcademicAPI.scheduleOnlineClass({ school_id: schoolId, teacher_id: teacher, classroom_id: cls, subject_id: sub, title: t, platform: document.getElementById('oc_platform').value, meeting_link: link, scheduled_at: new Date(time).toISOString(), duration_minutes: parseInt(document.getElementById('oc_dur').value) || 45 });
        showToast('Online class scheduled!'); document.getElementById('ocModal').style.display = 'none'; loadOnlineClasses();
      } catch (e) { showToast('Error: ' + e.message, 'error'); }
    }

    async function loadOnlineClasses() {
      if (!schoolId) { document.getElementById('ocTable').innerHTML = '<div class="text-center py-8 text-gray-400">Configure school first</div>'; return; }
      try {
        const r = await AcademicAPI.getOnlineClasses({ school_id: schoolId }); const ocs = r?.data || [];
        const hdrs = ['Title', 'Class', 'Subject', 'Platform', 'Scheduled At', 'Duration', 'Status', 'Link'];
        const rows = ocs.map(c => `
      <td class="px-4 py-3 font-medium text-gray-900 text-sm">${c.title}</td>
      <td class="px-4 py-3 text-sm text-gray-600">${c.classroom || '-'}</td>
      <td class="px-4 py-3 text-sm text-gray-600">${c.subject || '-'}</td>
      <td class="px-4 py-3">${tdBadge(c.platform, 'blue')}</td>
      <td class="px-4 py-3 text-sm text-gray-600">${c.scheduled_at ? new Date(c.scheduled_at).toLocaleString('en-IN', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' }) : '-'}</td>
      <td class="px-4 py-3 text-sm text-gray-600">${c.duration_minutes} min</td>
      <td class="px-4 py-3">${tdBadge(c.status, c.status === 'Live' ? 'green' : c.status === 'Scheduled' ? 'blue' : 'gray')}</td>
      <td class="px-4 py-3">${c.meeting_link ? `<a href="${c.meeting_link}" target="_blank" class="px-3 py-1 bg-blue-600 text-white rounded-lg text-xs font-medium hover:bg-blue-700">Join</a>` : '-'}</td>
    `);
        document.getElementById('ocTable').innerHTML = buildTable(hdrs, rows, 'No online classes scheduled yet');
      } catch (e) { }
    }

    async function loadTtClasses() {
      if (!schoolId) return;
      try {
        const r = await ClassAPI.list(schoolId, ayId); const cls = r?.data || [];
        document.getElementById('tt_cls').innerHTML = '<option value="">Select class</option>' + cls.map(c => `<option value="${c.id}" data-secs='${JSON.stringify(c.sections)}'>${c.name}</option>`).join('');
        document.getElementById('tt_cls').addEventListener('change', function () {
          const opt = this.options[this.selectedIndex], se = document.getElementById('tt_sec');
          se.innerHTML = '<option value="">Select section</option>';
          if (!opt?.dataset.secs) return;
          JSON.parse(opt.dataset.secs).forEach(s => se.innerHTML += `<option value="${s.id}">${s.name}</option>`);
        });
      } catch (e) { }
    }

    async function viewTimetable() {
      const clsId = document.getElementById('tt_cls').value, secId = document.getElementById('tt_sec').value;
      if (!clsId || !secId) { showToast('Select class and section', 'error'); return; }
      try {
        const r = await AcademicAPI.getTimetable(schoolId, clsId, secId);
        if (!r?.data) { document.getElementById('ttDisplay').innerHTML = '<div class="text-center py-8 text-gray-400"><div class="text-4xl mb-2">📅</div><p>No timetable found for this class/section</p></div>'; return; }
        const tt = r.data; const days = tt.days || [];
        const colors = ['bg-blue-50 text-blue-800', 'bg-emerald-50 text-emerald-800', 'bg-violet-50 text-violet-800', 'bg-orange-50 text-orange-800', 'bg-pink-50 text-pink-800', 'bg-yellow-50 text-yellow-800'];
        document.getElementById('ttDisplay').innerHTML = `
      <h5 class="font-bold text-gray-900 mb-4">${tt.name}</h5>
      <div class="overflow-x-auto">
        <div class="flex gap-4" style="min-width:700px">
          ${days.map((d, di) => `
            <div class="flex-1 min-w-0">
              <div class="text-center py-2 bg-gray-800 text-white rounded-t-xl text-sm font-semibold">${d.day}</div>
              <div class="space-y-1 mt-1">
                ${(d.periods || []).map((p, pi) => p.is_break ?
          `<div class="py-1.5 text-center text-xs text-gray-400 bg-gray-50 rounded-lg">${p.break_name || 'Break'}</div>` :
          `<div class="p-2 rounded-xl ${colors[pi % colors.length]}">
                    <div class="text-xs font-bold truncate">${p.subject || '—'}</div>
                    <div class="text-xs opacity-70 truncate">${p.teacher || ''}</div>
                    <div class="text-xs opacity-60">${p.start_time}–${p.end_time}</div>
                  </div>`
        ).join('')}
              </div>
            </div>`).join('')}
        </div>
      </div>`;
      } catch (e) { showToast('Error: ' + e.message, 'error'); }
    }

    loadHomework();
  </script>
</body>

</html>
